<script>
// ═══════════════════════════════════════════════════════════════
//  QG FUT TRADER — Motor v5 (Sofascore Engine)
//  Fonte: jogos_de_hoje.json (gerado pelo ETL Sofascore/Playwright)
//  200-400 jogos/dia com standings e form enriquecidos
//  Auto-refresh a cada 2 min | Fallback demonstração
// ═══════════════════════════════════════════════════════════════

const REFRESH_MS = 120000;

// ═══════════════════════════════════════════════════
//  FALLBACK — demonstração (quando JSON indisponível)
// ═══════════════════════════════════════════════════
const FALLBACK_MATCHES = [
    { id:"fb1", home:"Arsenal", away:"Liverpool", league:"PREMIER LEAGUE", time:"16:00", statusClass:"text-gray-400", scoreHome:"", scoreAway:"", venue:"EMIRATES STADIUM", alert:"", eloHome:"1842", eloAway:"1876", formHome:["V","V","E","V","D"], formAway:["V","V","V","E","V"], standings:{home:{pos:2,pts:68,p:30,sg:34},away:{pos:1,pts:72,p:30,sg:42}}, h2h:[{date:"2025-12-21",home:"Liverpool",score:"2-0",away:"Arsenal"},{date:"2025-08-17",home:"Arsenal",score:"1-1",away:"Liverpool"}], stats:{info:"Liverpool apenas 1 derrota nos últimos 15 jogos. Arsenal em casa com 87% aproveitamento.",reliability:"9.0"} },
    { id:"fb2", home:"Real Madrid", away:"Barcelona", league:"LA LIGA", time:"17:00", statusClass:"text-gray-400", scoreHome:"", scoreAway:"", venue:"BERNABÉU", alert:"", eloHome:"1930", eloAway:"1885", formHome:["V","V","V","D","V"], formAway:["V","E","V","V","V"], standings:{home:{pos:1,pts:74,p:29,sg:48},away:{pos:2,pts:68,p:29,sg:39}}, h2h:[{date:"2025-10-26",home:"Barcelona",score:"1-4",away:"Real Madrid"},{date:"2025-03-30",home:"Real Madrid",score:"3-2",away:"Barcelona"}], stats:{info:"El Clásico com Madrid líder. Domínio recente: 4V nos últimos 5 H2H.",reliability:"9.2"} },
    { id:"fb3", home:"Bayern", away:"Dortmund", league:"BUNDESLIGA", time:"15:30", statusClass:"text-gray-500", scoreHome:"3", scoreAway:"1", venue:"ALLIANZ ARENA", alert:"", eloHome:"1912", eloAway:"1780", formHome:["V","V","V","V","E"], formAway:["D","V","E","V","D"], standings:{home:{pos:1,pts:71,p:28,sg:54},away:{pos:3,pts:52,p:28,sg:18}}, h2h:[{date:"2025-11-30",home:"Dortmund",score:"1-3",away:"Bayern"}], stats:{info:"Bayern dominou Der Klassiker: 3-1.",reliability:"8.8"} },
    { id:"fb4", home:"Flamengo", away:"Palmeiras", league:"BRASILEIRÃO SÉRIE A", time:"19:00", statusClass:"text-gray-400", scoreHome:"", scoreAway:"", venue:"MARACANÃ", alert:"", eloHome:"1705", eloAway:"1720", formHome:["V","E","V","V","D"], formAway:["V","V","V","D","V"], standings:{home:{pos:3,pts:12,p:5,sg:5},away:{pos:1,pts:15,p:5,sg:8}}, h2h:[{date:"2025-10-05",home:"Flamengo",score:"2-1",away:"Palmeiras"}], stats:{info:"Clássico nacional no Maracanã. Palmeiras lidera o Brasileirão.",reliability:"8.7"} },
    { id:"fb5", home:"Corinthians", away:"São Paulo", league:"BRASILEIRÃO SÉRIE A", time:"16:00", statusClass:"text-gray-400", scoreHome:"", scoreAway:"", venue:"NEO QUÍMICA ARENA", alert:"", eloHome:"1640", eloAway:"1660", formHome:["D","V","E","D","V"], formAway:["V","V","D","V","E"], standings:{home:{pos:9,pts:8,p:5,sg:0},away:{pos:5,pts:10,p:5,sg:3}}, h2h:[{date:"2025-09-14",home:"São Paulo",score:"0-1",away:"Corinthians"}], stats:{info:"Derby paulista. São Paulo em melhor fase.",reliability:"8.2"} },
    { id:"fb6", home:"PSG", away:"Toulouse", league:"LIGUE 1", time:"16:00", statusClass:"text-gray-400", scoreHome:"", scoreAway:"", venue:"PARC DES PRINCES", alert:"", eloHome:"1880", eloAway:"1620", formHome:["V","V","V","E","V"], formAway:["D","E","V","D","V"], standings:{home:{pos:1,pts:70,p:28,sg:52},away:{pos:12,pts:34,p:28,sg:-5}}, h2h:[], stats:{info:"PSG líder isolado da Ligue 1.",reliability:"8.6"} }
];

// ═══════════════════════════════════════════════════
let liveGamesData = [];
let favorites = [];
let refreshTimer = null;
try { favorites = JSON.parse(localStorage.getItem('futTraderFavs')) || []; } catch(e) { favorites = []; }

// ───────────────────────────────────────────────────
//  HELPERS
// ───────────────────────────────────────────────────
function todayBRDisplay() {
    return new Date().toLocaleDateString("pt-BR", { timeZone: "America/Sao_Paulo" });
}

// ───────────────────────────────────────────────────
//  AGRUPA jogos por liga, ordena: AO VIVO primeiro
// ───────────────────────────────────────────────────
function agruparPorLiga(jogos) {
    const mapa = {};
    jogos.forEach(g => {
        const k = g.league || "FUTEBOL";
        if (!mapa[k]) mapa[k] = { name: k, games: [] };
        mapa[k].games.push(g);
    });
    // Ligas com jogos ao vivo primeiro, depois por quantidade
    return Object.values(mapa).sort((a, b) => {
        const aLive = a.games.some(g => g.alert);
        const bLive = b.games.some(g => g.alert);
        if (aLive && !bLive) return -1;
        if (!aLive && bLive) return 1;
        return b.games.length - a.games.length;
    });
}

// ───────────────────────────────────────────────────
//  PROCESSA JSON do ETL (Sofascore ou football-data)
// ───────────────────────────────────────────────────
function processarDadosCompletos(matches) {
    const fusoBR = { timeZone: "America/Sao_Paulo" };
    const hojeDisplay = todayBRDisplay();
    const jogos = [];

    matches.forEach(match => {
        const utc = new Date(match.utcDate);
        if (utc.toLocaleDateString("pt-BR", fusoBR) !== hojeDisplay) return;

        const liga = match.competition.name.toUpperCase();

        let horario = utc.toLocaleTimeString("pt-BR", { hour:"2-digit", minute:"2-digit", timeZone:"America/Sao_Paulo" });
        let statusClass = "text-gray-400", alert = "";

        if (match.status === "IN_PLAY" || match.status === "PAUSED") {
            horario = match.minute ? `${match.minute}` : "AO VIVO";
            statusClass = "text-trading-highlight animate-pulse";
            alert = match.status === "PAUSED" ? "INTERVALO" : "AO VIVO";
        } else if (match.status === "FINISHED") {
            horario = "ENCERRADO"; statusClass = "text-gray-500";
        } else if (match.status === "POSTPONED" || match.status === "CANCELLED") {
            horario = match.status === "POSTPONED" ? "ADIADO" : "CANCELADO"; statusClass = "text-red-500";
        }

        const gh = match.score?.fullTime?.home;
        const ga = match.score?.fullTime?.away;
        const intl = match.inteligencia || {
            clubelo:{ home_elo:"N/A", away_elo:"N/A" },
            recent_form:{ home:["-","-","-","-","-"], away:["-","-","-","-","-"] },
            standings:{ home:{pos:"-",pts:"-",p:"-",sg:"-"}, away:{pos:"-",pts:"-",p:"-",sg:"-"} },
            h2h:[], stats:{ info:"Sem dados.", reliability:"N/A" }
        };

        jogos.push({
            id: String(match.id),
            home: match.homeTeam.shortName || match.homeTeam.name,
            away: match.awayTeam.shortName || match.awayTeam.name,
            league: liga,
            time: horario, statusClass,
            scoreHome: gh != null ? String(gh) : "",
            scoreAway: ga != null ? String(ga) : "",
            venue: (match.venue || "").toUpperCase(),
            alert,
            eloHome: intl.clubelo?.home_elo || "N/A",
            eloAway: intl.clubelo?.away_elo || "N/A",
            formHome: Array.isArray(intl.recent_form?.home) ? intl.recent_form.home : ["-","-","-","-","-"],
            formAway: Array.isArray(intl.recent_form?.away) ? intl.recent_form.away : ["-","-","-","-","-"],
            standings: intl.standings || { home:{pos:"-",pts:"-",p:"-",sg:"-"}, away:{pos:"-",pts:"-",p:"-",sg:"-"} },
            h2h: intl.h2h || [],
            stats: intl.stats || { info:"Sem dados.", reliability:"N/A" }
        });
    });

    liveGamesData = agruparPorLiga(jogos);
    document.getElementById('game-count').innerText = jogos.length;
    document.getElementById('loading-ferrari')?.remove();
    renderAgenda();
    return jogos.length;
}

// ───────────────────────────────────────────────────
//  AUTO-REFRESH
// ───────────────────────────────────────────────────
async function refreshScores() {
    try {
        const r = await fetch("jogos_de_hoje.json?v=" + Date.now());
        if (!r.ok) return;
        const txt = await r.text();
        if (!txt || txt.trim().startsWith("<!")) return;
        const parsed = JSON.parse(txt);
        if (parsed.matches && parsed.matches.length > 0) {
            processarDadosCompletos(parsed.matches);
        }
    } catch(e) { console.warn("Refresh:", e); }
}

function startAutoRefresh() {
    if (refreshTimer) clearInterval(refreshTimer);
    refreshTimer = setInterval(refreshScores, REFRESH_MS);
}

// ───────────────────────────────────────────────────
//  MOTOR PRINCIPAL — JSON Sofascore → Fallback
// ───────────────────────────────────────────────────
async function carregarCombustivel() {
    const badge = document.getElementById('fonte-badge');

    // ── TENTATIVA 1: JSON gerado pelo ETL Sofascore ──
    try {
        const r = await fetch("jogos_de_hoje.json?v=" + Date.now());
        if (r.ok) {
            const txt = await r.text();
            if (txt && txt.trim() && !txt.trim().startsWith("<!")) {
                const parsed = JSON.parse(txt);
                if (parsed.matches && parsed.matches.length > 0) {
                    const count = processarDadosCompletos(parsed.matches);
                    const fonte = parsed._fonte || "ETL";
                    badge.innerHTML = `<span class="bg-green-900/50 text-green-400 text-[8px] font-black px-2 py-0.5 rounded uppercase border border-green-500/30">● ${count} JOGOS — ${fonte.toUpperCase()}</span>`;
                    startAutoRefresh();
                    return;
                }
            }
        }
    } catch(e) { /* JSON indisponível */ }

    // ── TENTATIVA 2: Fallback demonstração ──
    console.info("JSON indisponível. Usando dados de demonstração.");
    liveGamesData = agruparPorLiga(FALLBACK_MATCHES);
    document.getElementById('game-count').innerText = FALLBACK_MATCHES.length;
    document.getElementById('loading-ferrari')?.remove();
    badge.innerHTML = `<span class="bg-yellow-900/50 text-yellow-400 text-[8px] font-black px-2 py-0.5 rounded uppercase border border-yellow-500/30">● MODO DEMONSTRAÇÃO</span>`;
    renderAgenda();
}

// ───────────────────────────────────────────────────
//  UI HELPERS
// ───────────────────────────────────────────────────
function toggleFav(id) {
    id = String(id);
    favorites = favorites.includes(id) ? favorites.filter(f => f !== id) : [...favorites, id];
    localStorage.setItem('futTraderFavs', JSON.stringify(favorites));
    renderAgenda();
}

function switchTab(id, aba) {
    const c = document.getElementById(`details-${id}`);
    if (!c) return;
    c.querySelectorAll(`.tab-content-${id}`).forEach(x => x.classList.add('hidden'));
    c.querySelectorAll(`.tab-btn-${id}`).forEach(x => x.classList.remove('active'));
    document.getElementById(`content-${aba}-${id}`)?.classList.remove('hidden');
    document.getElementById(`tab-${aba}-${id}`)?.classList.add('active');
}

function toggleDetails(id) {
    const el = document.getElementById(`details-${id}`);
    if (!el) return;
    const opening = el.classList.contains('hidden');
    el.classList.toggle('hidden');
    if (opening) switchTab(id, 'resumo');
}

function renderFormDots(arr) {
    return arr.map(r => {
        const c = r==='V' ? 'bg-trading-win' : r==='D' ? 'bg-trading-loss' : 'bg-trading-draw';
        return `<div class="form-dot ${c}">${r}</div>`;
    }).join('');
}

// ───────────────────────────────────────────────────
//  RENDER PRINCIPAL
// ───────────────────────────────────────────────────
function renderAgenda() {
    const list = document.getElementById('agenda-list');
    const search = document.getElementById('agendaSearch').value.toUpperCase();

    // Preservar painéis abertos
    const openPanels = {};
    document.querySelectorAll('[id^="details-"]').forEach(el => {
        if (!el.classList.contains('hidden')) {
            const gid = el.id.replace('details-', '');
            const activeBtn = el.querySelector('.tab-btn.active');
            let tab = 'resumo';
            if (activeBtn) {
                const m = activeBtn.id.match(/^tab-(\w+)-/);
                if (m) tab = m[1];
            }
            openPanels[gid] = tab;
        }
    });

    list.innerHTML = '';

    let copy = JSON.parse(JSON.stringify(liveGamesData));
    let favGames = [];

    copy.forEach(league => {
        league.games = league.games.filter(g => {
            if (!g.home.toUpperCase().includes(search) && !g.away.toUpperCase().includes(search) && !league.name.includes(search)) return false;
            if (favorites.includes(g.id)) { favGames.push(g); return false; }
            return true;
        });
    });

    let display = [];
    if (favGames.length > 0) display.push({ name:"⭐ EVENTOS FAVORITOS", isFavSection:true, games:favGames });
    copy.forEach(l => { if (l.games.length > 0) display.push(l); });

    if (display.length === 0) {
        list.innerHTML = `<div class="text-center py-20 text-gray-500 text-xs font-bold uppercase">Nenhum evento encontrado.</div>`;
        return;
    }

    display.forEach(league => {
        const hc = league.isFavSection ? "text-trading-highlight" : "text-white";
        let html = `
            <div class="league-section animate-in">
                <div class="flex items-center gap-3 mb-3 px-2">
                    <div class="w-1 h-4 bg-trading-highlight rounded-full ${league.isFavSection?'animate-pulse':''}"></div>
                    <span class="text-[11px] font-black ${hc} uppercase tracking-[2px]">${league.name}</span>
                    <span class="text-[9px] text-gray-600 font-bold">${league.games.length} jogo${league.games.length>1?'s':''}</span>
                </div>
                <div class="bg-trading-panel rounded-xl border ${league.isFavSection?'border-trading-highlight/30':'border-trading-border'} overflow-hidden divide-y divide-white/5 shadow-xl">`;

        league.games.forEach(game => {
            const isFav = favorites.includes(game.id);
            const stdH = game.standings.home, stdA = game.standings.away;

            const scoreHtml = (game.scoreHome !== "" || game.scoreAway !== "")
                ? `<span class="text-lg md:text-xl font-black text-trading-highlight mx-2">${game.scoreHome}</span><span class="text-[9px] text-gray-500 font-black italic bg-black/40 px-2 py-1 rounded">VS</span><span class="text-lg md:text-xl font-black text-trading-highlight mx-2">${game.scoreAway}</span>`
                : `<span class="text-[9px] text-gray-500 font-black italic bg-black/40 px-2 py-1 rounded mx-3">VS</span>`;
            const alertHtml = game.alert
                ? `<span class="bg-red-600 text-white text-[8px] font-black uppercase px-2 py-0.5 rounded shadow-[0_0_8px_rgba(220,38,38,0.8)] ml-3 animate-pulse border border-red-400">${game.alert}</span>`
                : '';

            const classHtml = `
                <div class="flex flex-col gap-6 animate-in">
                    <div class="w-full bg-white/[0.02] p-4 rounded-xl border border-white/5">
                        <table class="w-full text-xs text-left">
                            <thead class="text-[9px] text-gray-500 uppercase border-b border-white/10">
                                <tr><th class="pb-2 w-8">#</th><th class="pb-2">Time</th><th class="pb-2 text-center w-8">P</th><th class="pb-2 text-center w-8">J</th><th class="pb-2 text-center w-8">SG</th></tr>
                            </thead>
                            <tbody class="text-white">
                                <tr class="border-b border-white/5 hover:bg-white/5">
                                    <td class="py-3 text-trading-highlight font-bold">${stdH.pos}</td><td class="py-3 font-black">${game.home}</td><td class="py-3 text-center font-black">${stdH.pts}</td><td class="py-3 text-center text-gray-400">${stdH.p}</td><td class="py-3 text-center text-gray-400">${stdH.sg}</td>
                                </tr>
                                <tr class="hover:bg-white/5">
                                    <td class="py-3 text-trading-highlight font-bold">${stdA.pos}</td><td class="py-3 font-black">${game.away}</td><td class="py-3 text-center font-black">${stdA.pts}</td><td class="py-3 text-center text-gray-400">${stdA.p}</td><td class="py-3 text-center text-gray-400">${stdA.sg}</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>`;

            const h2hLinhas = (game.h2h||[]).map(h => `
                <div class="flex justify-between items-center bg-black/30 p-2.5 rounded-lg border border-white/5 text-xs hover:bg-black/50 transition">
                    <span class="text-gray-500 w-16 text-[9px] font-bold">${h.date}</span>
                    <div class="flex-1 text-right text-gray-400 font-bold pr-3">${h.home}</div>
                    <div class="bg-black/60 px-3 py-1 rounded border border-white/5 text-white font-mono font-black w-14 text-center shadow-inner">${h.score}</div>
                    <div class="flex-1 text-left text-white font-black pl-3">${h.away}</div>
                </div>`).join('');

            const h2hHtml = `
                <div class="animate-in">
                    <div class="bg-white/[0.02] p-5 rounded-xl border border-white/5">
                        <p class="text-[9px] text-gray-500 uppercase font-bold mb-4">Últimos Confrontos</p>
                        <div class="space-y-2">${h2hLinhas || '<p class="text-gray-600 text-xs text-center py-4">Sem dados de H2H.</p>'}</div>
                    </div>
                </div>`;

            const statsHtml = `
                <div class="animate-in space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="bg-white/[0.02] border border-white/5 p-5 rounded-2xl">
                            <h4 class="text-[10px] text-gray-500 font-black uppercase tracking-widest mb-4 flex justify-between items-center">
                                <span>Informação Crítica</span>
                                <span class="text-trading-highlight">Confiabilidade</span>
                            </h4>
                            <div class="flex justify-between items-start gap-4 p-3 bg-black/20 rounded-lg border-l-2 border-trading-highlight">
                                <div class="flex-1">
                                    <p class="text-[9px] text-gray-500 font-bold mb-1">Scouting Automático</p>
                                    <p class="text-[11px] text-white">${game.stats.info}</p>
                                </div>
                                <span class="text-xs font-black text-trading-highlight bg-trading-highlight/10 px-2 py-1 rounded">${game.stats.reliability}</span>
                            </div>
                        </div>
                        <div class="bg-white/[0.02] border border-white/5 p-5 rounded-2xl">
                            <h4 class="text-[10px] text-gray-500 font-black uppercase tracking-widest mb-4">Fatores Externos</h4>
                            <div class="grid grid-cols-2 gap-4">
                                <div class="p-3 bg-black/20 rounded-lg border border-white/5">
                                    <p class="text-[9px] text-gray-500 font-bold mb-1 uppercase"><i class="fas fa-cloud-sun mr-1"></i> Clima</p>
                                    <p class="text-[11px] text-white">Nublado, 24°C. Neutro.</p>
                                </div>
                                <div class="p-3 bg-black/20 rounded-lg border border-white/5">
                                    <p class="text-[9px] text-gray-500 font-bold mb-1 uppercase"><i class="fas fa-gavel mr-1"></i> Árbitro</p>
                                    <p class="text-[11px] text-white">Dados indisponíveis</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>`;

            html += `
                <div class="game-item relative">
                    <div class="p-5 md:p-6 flex items-center justify-between cursor-pointer hover:bg-white/[0.02] transition-colors" onclick="toggleDetails('${game.id}')">
                        <div class="flex items-center gap-4 md:gap-8 w-full">
                            <div class="text-center min-w-[50px] md:min-w-[60px]">
                                <p class="${game.statusClass} font-mono font-black text-xs md:text-sm uppercase tracking-tighter">${game.time}</p>
                            </div>
                            <div class="flex flex-col flex-1">
                                <div class="flex items-center flex-wrap">
                                    <span class="text-sm md:text-base font-black text-white uppercase tracking-tight">${game.home}</span>
                                    ${scoreHtml}
                                    <span class="text-sm md:text-base font-black text-white uppercase tracking-tight">${game.away}</span>
                                    ${alertHtml}
                                </div>
                                <span class="text-[9px] text-gray-500 uppercase mt-2 tracking-wider truncate max-w-xs">${game.venue ? '<i class="fas fa-map-marker-alt mr-1 text-gray-600"></i>' + game.venue : ''}</span>
                            </div>
                        </div>
                        <div class="flex items-center pl-2">
                            <button onclick="event.stopPropagation();toggleFav('${game.id}')" class="focus:outline-none p-3">
                                <i class="fa-star ${isFav?'fas text-trading-highlight drop-shadow-[0_0_5px_rgba(255,177,0,0.5)]':'far text-gray-700'} text-xl md:text-2xl transition-transform hover:scale-125"></i>
                            </button>
                        </div>
                    </div>
                    <div id="details-${game.id}" class="hidden bg-[#0D1117] border-t border-white/5 shadow-inner">
                        <div class="flex gap-6 md:gap-8 px-6 md:px-8 border-b border-white/5 overflow-x-auto no-scrollbar pt-4">
                            <button onclick="switchTab('${game.id}','resumo')" id="tab-resumo-${game.id}" class="tab-btn tab-btn-${game.id} active whitespace-nowrap">RESUMO</button>
                            <button onclick="switchTab('${game.id}','class')"  id="tab-class-${game.id}"  class="tab-btn tab-btn-${game.id} whitespace-nowrap">CLASSIFICAÇÃO</button>
                            <button onclick="switchTab('${game.id}','h2h')"    id="tab-h2h-${game.id}"    class="tab-btn tab-btn-${game.id} whitespace-nowrap">H2H DETALHADO</button>
                            <button onclick="switchTab('${game.id}','top')"    id="tab-top-${game.id}"    class="tab-btn tab-btn-${game.id} whitespace-nowrap">DESTAQUES</button>
                        </div>
                        <div class="p-6 md:p-8 relative min-h-[150px]">
                            <div id="content-resumo-${game.id}" class="tab-content-${game.id} grid grid-cols-1 md:grid-cols-3 gap-6 animate-in">
                                <div class="space-y-3 bg-white/[0.02] p-4 rounded-xl border border-white/5">
                                    <h4 class="text-[9px] text-gray-500 font-black uppercase tracking-widest">Momento Recente</h4>
                                    <div class="flex items-center gap-4">
                                        <div class="flex gap-1">${renderFormDots(game.formHome)}</div>
                                        <div class="w-px h-6 bg-white/10"></div>
                                        <div class="flex gap-1">${renderFormDots(game.formAway)}</div>
                                    </div>
                                </div>
                                <div class="space-y-3 bg-white/[0.02] p-4 rounded-xl border border-white/5">
                                    <h4 class="text-[9px] text-gray-500 font-black uppercase tracking-widest">Status da Partida</h4>
                                    <p class="text-[11px] text-white/70">Horário: <span class="text-white font-bold ml-1">${game.time}</span></p>
                                    <p class="text-[11px] text-white/70 truncate">Local: <span class="text-white font-bold ml-1">${game.venue || 'N/A'}</span></p>
                                </div>
                                <div class="bg-trading-highlight/10 p-4 rounded-xl border-l-4 border-trading-highlight flex flex-col justify-center">
                                    <h4 class="text-[9px] text-trading-highlight font-black uppercase mb-1 tracking-widest">Análise ClubElo</h4>
                                    <div class="flex justify-between items-center mt-2">
                                        <div class="text-center"><p class="text-[9px] text-gray-400 uppercase font-bold mb-1">${game.home.substring(0,8)}</p><p class="text-lg font-black text-white">${game.eloHome}</p></div>
                                        <span class="text-gray-600 text-[10px] mx-2 font-black italic">VS</span>
                                        <div class="text-center"><p class="text-[9px] text-gray-400 uppercase font-bold mb-1">${game.away.substring(0,8)}</p><p class="text-lg font-black text-white">${game.eloAway}</p></div>
                                    </div>
                                </div>
                            </div>
                            <div id="content-class-${game.id}" class="tab-content-${game.id} hidden animate-in">${classHtml}</div>
                            <div id="content-h2h-${game.id}"   class="tab-content-${game.id} hidden animate-in">${h2hHtml}</div>
                            <div id="content-top-${game.id}"   class="tab-content-${game.id} hidden animate-in">${statsHtml}</div>
                        </div>
                    </div>
                </div>`;
        });

        html += `</div></div>`;
        list.innerHTML += html;
    });

    // Restaurar painéis abertos
    for (const [gid, tab] of Object.entries(openPanels)) {
        const el = document.getElementById(`details-${gid}`);
        if (el) {
            el.classList.remove('hidden');
            switchTab(gid, tab);
        }
    }
}

// ───────────────────────────────────────────────────
//  INIT
// ───────────────────────────────────────────────────
window.onload = () => carregarCombustivel();
</script>
</body>
</html>
