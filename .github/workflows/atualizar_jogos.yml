name: "Motor ETL v5 — Sofascore + Playwright"

on:
  # A cada 15 minutos para placares frescos
  schedule:
    - cron: '*/15 * * * *'

  push:
    branches: [ main, master ]

  workflow_dispatch:

permissions:
  contents: write

jobs:
  gerar-combustivel:
    name: "Gerar jogos_de_hoje.json"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: |
          pip install requests playwright
          python -m playwright install chromium --with-deps

      - name: Executar Motor ETL v5
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: python gerar_jogos.py

      - name: Commit e Push do JSON
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add jogos_de_hoje.json
          if git diff --staged --quiet; then
            echo "Sem mudanças no JSON."
          else
            git commit -m "Combustivel injetado — $(date -u '+%d/%m %H:%M UTC')"
            git push
          fi
