<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comunidade - Fut Trader</title>
    
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* Estilos específicos para a página de placeholder */
        .community-hero {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            min-height: 80vh;
            padding: 20px;
        }

        .community-card {
            background: #1b262c;
            padding: 40px;
            border-radius: 15px;
            border: 1px dashed #ffb100;
            max-width: 600px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .icon-box {
            font-size: 50px;
            margin-bottom: 20px;
        }

        h1 { margin-bottom: 15px; font-size: 28px; }
        p { color: #A0AEC0; margin-bottom: 25px; line-height: 1.6; }

        .btn-back {
            display: inline-block;
            background-color: #ffb100;
            color: #000;
            padding: 10px 25px;
            border-radius: 5px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-back:hover {
            background-color: #e69f00;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">
            <span>FUT</span> TRADER
        </div>
        
        <ul class="nav-links">
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="aovivo.html">Ao Vivo</a></li>
            <li><a href="comunidade.html">Comunidade</a></li>
            <li><a href="index.html" class="btn-sair">Sair</a></li>
        </ul>
    </nav>

    <div class="community-hero">
        <div class="community-card">
            <div class="icon-box">🤝</div>
            <h1>Comunidade Fut Trader</h1>
            <p>
                Estamos preparando um espaço exclusivo para troca de informações, 
                análise de tips e discussão de estratégias em tempo real. 
                <br><br>
                Em breve, você poderá se conectar com outros traders da nossa rede!
            </p>
            <a href="dashboard.html" class="btn-back">Voltar ao Painel</a>
        </div>
    </div>

</body>
</html>
