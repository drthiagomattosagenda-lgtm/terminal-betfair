<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QG Fut Trader - Central de Inteligência</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        trading: {
                            dark: '#0B0E14',
                            panel: '#151A22',
                            border: '#2A3241',
                            highlight: '#FFB100',
                            win: '#10B981',
                            loss: '#EF4444'
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body { background-color: #0B0E14; color: #E2E8F0; font-family: 'Inter', sans-serif; }
        .nav-links { display: flex; gap: 20px; list-style: none; }
        .nav-links a { color: #718096; font-size: 14px; font-weight: 600; text-decoration: none; transition: 0.3s; }
        .nav-links a:hover { color: #FFB100; }
        .tab-btn { color: #718096; font-size: 10px; font-weight: 800; text-transform: uppercase; transition: 0.2s; position: relative; }
        .tab-btn.active { color: #FFB100; }
        .tab-btn.active::after { content: ''; position: absolute; bottom: -8px; left: 0; width: 100%; height: 2px; background: #FFB100; }
        .animate-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="antialiased">

    <nav class="border-b border-trading-border p-4 mb-8">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="text-xl font-black italic tracking-tighter text-white">FUT <span class="text-trading-highlight">TRADER</span></div>
            <ul class="nav-links">
                <li><a href="inicio.html" class="text-trading-highlight">Início</a></li>
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="aovivo.html">Ao Vivo</a></li>
                <li><a href="index.html" class="text-red-500">Sair</a></li>
            </ul>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-4">
        <div class="flex flex-col md:flex-row justify-between items-end mb-10 gap-6">
            <div>
                <h1 class="text-4xl font-black text-white tracking-tighter uppercase italic">QUARTEL <span class="text-trading-highlight">GENERAL</span></h1>
                <p class="text-gray-500 text-sm font-medium">Dados reais de <span id="game-count" class="text-white">0</span> partidas ao redor do mundo.</p>
            </div>
            <div class="w-full md:w-auto">
                <input type="text" id="agendaSearch" oninput="renderAgenda()" placeholder="🔎 Filtrar time ou liga..." 
                class="w-full md:w-80 bg-trading-panel border border-trading-border rounded-xl py-3 px-6 text-xs focus:outline-none focus:border-trading-highlight text-white shadow-2xl">
            </div>
        </div>

        <div id="loading-alert" class="text-center py-20">
            <i class="fas fa-circle-notch fa-spin text-trading-highlight text-3xl"></i>
            <p class="text-gray-500 mt-4 font-bold uppercase text-xs tracking-widest">Sincronizando com o Motor ESPN...</p>
        </div>

        <div id="agenda-list" class="space-y-10"></div>
    </main>

    <script>
        let gamesData = [];
        let favorites = JSON.parse(localStorage.getItem('futTraderFavs')) || [];

        async function conectarAoMotor() {
            const loadingAlert = document.getElementById('loading-alert');
            try {
                const response = await fetch('https://motor-ferrari.onrender.com/jogos');
                const result = await response.json();

                if (result.sucesso && result.dados.length > 0) {
                    // AGRUPAMENTO POR LIGA (Igual SofaScore)
                    const grouped = result.dados.reduce((acc, game) => {
                        const key = game.league;
                        if (!acc[key]) acc[key] = { name: key, country: game.country, games: [] };
                        acc[key].games.push(game);
                        return acc;
                    }, {});

                    gamesData = Object.values(grouped);
                    loadingAlert.classList.add('hidden');
                    renderAgenda();
                } else {
                    throw new Error("Dados vazios");
                }
            } catch (error) {
                console.error("Erro:", error);
                loadingAlert.innerHTML = `<p class="text-yellow-500 text-xs font-bold uppercase italic">Aguardando resposta do motor... (Reconectando em 5s)</p>`;
                setTimeout(conectarAoMotor, 5000);
            }
        }

        function renderAgenda() {
            const list = document.getElementById('agenda-list');
            const search = document.getElementById('agendaSearch').value.toUpperCase();
            let totalCount = 0;
            list.innerHTML = '';

            gamesData.forEach(league => {
                const filteredGames = league.games.filter(g => 
                    g.home.toUpperCase().includes(search) || g.away.toUpperCase().includes(search) || league.name.toUpperCase().includes(search)
                );

                if (filteredGames.length > 0) {
                    let html = `
                        <div class="league-section animate-in">
                            <div class="flex items-center gap-2 mb-3 px-2">
                                <i class="fas fa-trophy text-trading-highlight text-[10px]"></i>
                                <span class="text-[10px] font-black text-gray-400 uppercase tracking-[2px]">${league.country}: ${league.name}</span>
                            </div>
                            <div class="bg-trading-panel rounded-2xl border border-trading-border overflow-hidden divide-y divide-white/5">
                    `;

                    filteredGames.forEach(game => {
                        totalCount++;
                        const isFav = favorites.includes(game.id);
                        html += `
                            <div class="game-item">
                                <div class="p-5 flex items-center justify-between cursor-pointer hover:bg-white/5 transition" onclick="toggleDetails('${game.id}')">
                                    <div class="flex items-center gap-6">
                                        <span class="text-xs font-mono font-bold text-trading-highlight min-w-[50px]">${game.time}</span>
                                        <div class="flex flex-col">
                                            <div class="flex items-center gap-3">
                                                <span class="text-sm font-bold text-white uppercase tracking-tight">${game.home}</span>
                                                <span class="text-[10px] text-gray-700 italic">vs</span>
                                                <span class="text-sm font-bold text-white uppercase tracking-tight">${game.away}</span>
                                            </div>
                                            <span class="text-[9px] text-gray-500 uppercase mt-1"><i class="fas fa-map-marker-alt mr-1"></i>${game.venue}</span>
                                        </div>
                                    </div>
                                    <div class="flex items-center gap-6">
                                        <div class="bg-black/40 px-3 py-1 rounded-lg border border-white/5 text-xs font-mono font-black text-white">${game.score}</div>
                                        <i onclick="event.stopPropagation(); toggleFav('${game.id}')" class="fa-star ${isFav ? 'fas text-trading-highlight' : 'far text-gray-600'} text-lg transition hover:scale-120"></i>
                                    </div>
                                </div>

                                <div id="details-${game.id}" class="hidden bg-black/30 border-t border-white/5 p-6 animate-in">
                                    <div class="flex gap-8 mb-6 border-b border-white/5">
                                        <button onclick="switchTab('${game.id}', 'resumo')" id="tab-resumo-${game.id}" class="tab-btn active pb-3">Resumo</button>
                                        <button onclick="switchTab('${game.id}', 'h2h')" id="tab-h2h-${game.id}" class="tab-btn pb-3">H2H / Forma</button>
                                    </div>
                                    <div id="content-resumo-${game.id}" class="tab-content-${game.id} space-y-4">
                                        <p class="text-[10px] text-gray-400 uppercase"><b class="text-white">Competição:</b> ${game.league}</p>
                                        <p class="text-[10px] text-gray-400 uppercase"><b class="text-white">Local:</b> ${game.venue}</p>
                                        <div class="bg-trading-highlight/10 p-3 rounded-lg border-l-2 border-trading-highlight">
                                            <p class="text-[10px] text-trading-highlight italic font-bold">DICA: Partida processada em tempo real via Central ESPN.</p>
                                        </div>
                                    </div>
                                    <div id="content-h2h-${game.id}" class="tab-content-${game.id} hidden">
                                        <p class="text-[10px] text-gray-500 italic">Confrontos diretos e forma recente em sincronização...</p>
                                    </div>
                                </div>
                            </div>
                        `;
                    });
                    html += `</div></div>`;
                    list.innerHTML += html;
                }
            });
            document.getElementById('game-count').innerText = totalCount;
        }

        function toggleDetails(id) { document.getElementById(`details-${id}`).classList.toggle('hidden'); }
        function switchTab(id, tab) {
            const container = document.getElementById(`details-${id}`);
            container.querySelectorAll(`.tab-content-${id}`).forEach(c => c.classList.add('hidden'));
            container.querySelectorAll(`.tab-btn`).forEach(b => b.classList.remove('active'));
            document.getElementById(`content-${tab}-${id}`).classList.remove('hidden');
            document.getElementById(`tab-${tab}-${id}`).classList.add('active');
            event.stopPropagation();
        }
        function toggleFav(id) {
            favorites.includes(id) ? favorites = favorites.filter(f => f !== id) : favorites.push(id);
            localStorage.setItem('futTraderFavs', JSON.stringify(favorites));
            renderAgenda();
        }

        conectarAoMotor();
    </script>
</body>
</html>
