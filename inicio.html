<script>
    let gamesData = [];
    let favorites = JSON.parse(localStorage.getItem('futTraderFavs')) || [];

    async function conectarAoMotor() {
        const loadingAlert = document.getElementById('loading-alert');
        try {
            const response = await fetch('https://motor-ferrari.onrender.com/jogos');
            const result = await response.json();

            if (result.sucesso && result.dados.length > 0) {
                // AGRUPAMENTO POR LIGA (ESTILO SOFASCORE)
                const grouped = result.dados.reduce((acc, game) => {
                    const key = game.league;
                    if (!acc[key]) acc[key] = { name: key, country: game.country, games: [] };
                    acc[key].games.push(game);
                    return acc;
                }, {});

                gamesData = Object.values(grouped);
                loadingAlert.classList.add('hidden');
                renderAgenda();
            } else {
                throw new Error("Sem dados");
            }
        } catch (error) {
            console.error("Erro:", error);
            setTimeout(conectarAoMotor, 5000); // Tenta de novo se falhar
        }
    }

    function renderAgenda() {
        const list = document.getElementById('agenda-list');
        const search = document.getElementById('agendaSearch').value.toUpperCase();
        let totalCount = 0;
        list.innerHTML = '';

        gamesData.forEach(league => {
            const filteredGames = league.games.filter(g => 
                g.home.toUpperCase().includes(search) || g.away.toUpperCase().includes(search)
            );

            if (filteredGames.length > 0) {
                let html = `
                    <div class="league-section mb-6 animate-in">
                        <div class="league-header px-4 py-2 flex items-center bg-trading-panel rounded-t-xl border-b border-trading-border">
                            <span class="text-[10px] font-black text-trading-highlight uppercase tracking-widest">${league.country}: ${league.name}</span>
                        </div>
                        <div class="bg-[#11161d] divide-y divide-white/5 rounded-b-xl border-x border-b border-trading-border overflow-hidden">
                `;

                filteredGames.forEach(game => {
                    totalCount++;
                    const isFav = favorites.includes(game.id);
                    html += `
                        <div class="game-wrapper">
                            <div class="game-card p-4 flex items-center justify-between cursor-pointer" onclick="toggleDetails('${game.id}')">
                                <div class="flex items-center gap-6">
                                    <div class="text-center min-w-[60px]">
                                        <p class="text-trading-highlight font-mono font-bold text-sm">${game.time}</p>
                                    </div>
                                    <div class="flex flex-col">
                                        <div class="flex items-center gap-2">
                                            <span class="text-sm font-bold text-white uppercase">${game.home}</span>
                                            <span class="text-xs text-gray-600">vs</span>
                                            <span class="text-sm font-bold text-white uppercase">${game.away}</span>
                                        </div>
                                        <span class="text-[9px] text-gray-500 uppercase"><i class="fas fa-stadium mr-1"></i>${game.venue}</span>
                                    </div>
                                </div>
                                <div class="flex items-center gap-4">
                                    <span class="text-xs font-mono text-gray-400 bg-black/30 px-2 py-1 rounded">${game.score}</span>
                                    <i onclick="event.stopPropagation(); toggleFav('${game.id}')" class="fa-star ${isFav ? 'fas text-trading-highlight' : 'far text-gray-700'}"></i>
                                </div>
                            </div>

                            <div id="details-${game.id}" class="hidden bg-black/20 border-t border-white/5 p-4 animate-in">
                                <div class="flex gap-4 mb-4 border-b border-white/5">
                                    <button onclick="switchTab('${game.id}', 'resumo')" id="tab-resumo-${game.id}" class="tab-btn active pb-2">Resumo</button>
                                    <button onclick="switchTab('${game.id}', 'class')" id="tab-class-${game.id}" class="tab-btn pb-2">Classificação</button>
                                    <button onclick="switchTab('${game.id}', 'h2h')" id="tab-h2h-${game.id}" class="tab-btn pb-2">H2H</button>
                                </div>
                                
                                <div id="content-resumo-${game.id}" class="tab-content-${game.id} text-xs text-gray-400">
                                    <p><b class="text-white">Estádio:</b> ${game.venue}</p>
                                    <p class="mt-2 text-trading-highlight italic">"Dica: Jogo em andamento via ESPN Data."</p>
                                </div>
                                <div id="content-class-${game.id}" class="tab-content-${game.id} hidden text-xs text-gray-400">
                                    <p>${game.standings}</p>
                                </div>
                                <div id="content-h2h-${game.id}" class="tab-content-${game.id} hidden text-xs text-gray-400">
                                    <p>${game.h2h_summary}</p>
                                </div>
                            </div>
                        </div>
                    `;
                });
                html += `</div></div>`;
                list.innerHTML += html;
            }
        });
        document.getElementById('game-count').innerText = totalCount;
    }

    // Funções de Suporte (ID corrigido para String devido aos IDs da ESPN)
    function toggleDetails(id) { document.getElementById(`details-${id}`).classList.toggle('hidden'); }
    function switchTab(id, tab) {
        const container = document.getElementById(`details-${id}`);
        container.querySelectorAll(`[id^="content-"]`).forEach(c => c.classList.add('hidden'));
        container.querySelectorAll(`.tab-btn`).forEach(b => b.classList.remove('active'));
        document.getElementById(`content-${tab}-${id}`).classList.remove('hidden');
        document.getElementById(`tab-${tab}-${id}`).classList.add('active');
        event.stopPropagation();
    }
    function toggleFav(id) { 
        favorites.includes(id) ? favorites = favorites.filter(f => f !== id) : favorites.push(id); 
        localStorage.setItem('futTraderFavs', JSON.stringify(favorites)); 
        renderAgenda(); 
    }

    conectarAoMotor();
</script>
