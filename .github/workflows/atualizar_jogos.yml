name: ⛽ Motor ETL — Atualizar Jogos do Dia

on:
  # Dispara automaticamente a cada hora (cobertura total do dia)
  schedule:
    - cron: '0 * * * *'

  # Dispara também a cada push no repositório (útil para testar)
  push:
    branches: [ main, master ]

  # Permite disparo manual via painel do GitHub
  workflow_dispatch:

permissions:
  contents: write

jobs:
  gerar-combustivel:
    name: ⛽ Gerar jogos_de_hoje.json
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Instalar requests
        run: pip install requests

      - name: 🚀 Executar Motor ETL
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: python gerar_jogos.py

      - name: 💾 Commit e Push do JSON
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add jogos_de_hoje.json
          if git diff --staged --quiet; then
            echo "ℹ️  Sem mudanças no JSON."
          else
            git commit -m "⛽ Combustível injetado — $(date -u '+%d/%m %H:%M UTC')"
            git push
          fi
