    <script>
// ═══════════════════════════════════════════════════════════════
//  QG FUT TRADER — Motor v6 (Lataria Perfeita + Combustível Real)
//  Fonte: jogos_de_hoje.json (ETL Sofascore/Playwright)
//  Visual: 100% preservado da versão de referência desktop
//  Auto-refresh: 2 min | Fallback: demonstração com 6 jogos
// ═══════════════════════════════════════════════════════════════

const REFRESH_MS = 120000;
let _debounceTimer = null;
function debouncedRender() {
    clearTimeout(_debounceTimer);
    _debounceTimer = setTimeout(renderAgenda, 300);
}

// ═══════════════════════════════════════════════════
//  FALLBACK — demonstração (quando JSON indisponível)
// ═══════════════════════════════════════════════════

    { id:"fb3", type:"pontos_corridos", league:"\uD83C\uDDE9\uD83C\uDDEA BUNDESLIGA", home:"Bayern", away:"Dortmund", time:"ENCERRADO", statusClass:"text-gray-500", scoreHome:"3", scoreAway:"1", venue:"ALLIANZ ARENA", alert:"", eloHome:"1912", eloAway:"1780", formHome:["V","V","V","V","E"], formAway:["D","V","E","V","D"], standings:{home:{pos:1,pts:71,p:28,sg:"+54"},away:{pos:3,pts:52,p:28,sg:"+18"}}, h2h:[{date:"30 NOV 25",home:"Dortmund",score:"1 - 3",away:"Bayern"}], stats:{info:"Bayern dominou Der Klassiker: 3-1.",reliability:"8.8"} },
    { id:"fb4", type:"pontos_corridos", league:"\uD83C\uDDE7\uD83C\uDDF7 BRASILEIR\u00C3O S\u00C9RIE A", home:"Flamengo", away:"Palmeiras", time:"19:00", statusClass:"text-gray-400", scoreHome:"", scoreAway:"", venue:"MARACAN\u00C3", alert:"", eloHome:"1705", eloAway:"1720", formHome:["V","E","V","V","D"], formAway:["V","V","V","D","V"], standings:{home:{pos:3,pts:12,p:5,sg:"+5"},away:{pos:1,pts:15,p:5,sg:"+8"}}, h2h:[{date:"05 OUT 25",home:"Flamengo",score:"2 - 1",away:"Palmeiras"}], stats:{info:"Cl\u00E1ssico nacional no Maracan\u00E3. Palmeiras lidera o Brasileir\u00E3o.",reliability:"8.7"} },
    { id:"fb5", type:"pontos_corridos", league:"\uD83C\uDDE7\uD83C\uDDF7 BRASILEIR\u00C3O S\u00C9RIE A", home:"Corinthians", away:"S\u00E3o Paulo", time:"16:00", statusClass:"text-gray-400", scoreHome:"", scoreAway:"", venue:"NEO QU\u00CDMICA ARENA", alert:"", eloHome:"1640", eloAway:"1660", formHome:["D","V","E","D","V"], formAway:["V","V","D","V","E"], standings:{home:{pos:9,pts:8,p:5,sg:"0"},away:{pos:5,pts:10,p:5,sg:"+3"}}, h2h:[{date:"14 SET 25",home:"S\u00E3o Paulo",score:"0 - 1",away:"Corinthians"}], stats:{info:"Derby paulista. S\u00E3o Paulo em melhor fase.",reliability:"8.2"} },
    { id:"fb6", type:"pontos_corridos", league:"\uD83C\uDDEB\uD83C\uDDF7 LIGUE 1", home:"PSG", away:"Toulouse", time:"16:00", statusClass:"text-gray-400", scoreHome:"", scoreAway:"", venue:"PARC DES PRINCES", alert:"", eloHome:"1880", eloAway:"1620", formHome:["V","V","V","E","V"], formAway:["D","E","V","D","V"], standings:{home:{pos:1,pts:70,p:28,sg:"+52"},away:{pos:12,pts:34,p:28,sg:"-5"}}, h2h:[], stats:{info:"PSG l\u00EDder isolado da Ligue 1.",reliability:"8.6"} }
];

// ═══════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════
let liveGamesData = [];
let favorites = [];
let refreshTimer = null;
try { favorites = JSON.parse(localStorage.getItem('futTraderFavs')) || []; } catch(e) { favorites = []; }

// ═══════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════
function todayBRDisplay() {
    return new Date().toLocaleDateString("pt-BR", { timeZone: "America/Sao_Paulo" });
}

function getLeagueFlag(name) {
    const n = name.toLowerCase();
    const flags = [
        ['premier league','🏴󠁧󠁢󠁥󠁮󠁧󠁿'],['fa cup','🏴󠁧󠁢󠁥󠁮󠁧󠁿'],['championship','🏴󠁧󠁢󠁥󠁮󠁧󠁿'],
        ['laliga','🇪🇸'],['la liga','🇪🇸'],['liga f','🇪🇸'],
        ['bundesliga','🇩🇪'],['2. bundesliga','🇩🇪'],
        ['ligue 1','🇫🇷'],['ligue 2','🇫🇷'],
        ['serie a','🇮🇹'],['serie b','🇮🇹'],['primavera','🇮🇹'],['serie a femminile','🇮🇹'],
        ['brasileir','🇧🇷'],['copa do brasil','🇧🇷'],
        ['champions league','🏆'],['europa league','🏆'],['conference league','🏆'],
        ['libertadores','🏆'],['sudamericana','🏆'],['copa america','🏆'],['afc','🏆'],
        ['chinese','🇨🇳'],['k league','🇰🇷'],['k-league','🇰🇷'],
        ['j1 league','🇯🇵'],['j2','🇯🇵'],['j3','🇯🇵'],
        ['liga mx','🇲🇽'],['liga de expansion','🇲🇽'],
        ['eredivisie','🇳🇱'],['liga portugal','🇵🇹'],['campeonato de portugal','🇵🇹'],
        ['super lig','🇹🇷'],['süper lig','🇹🇷'],['1. lig','🇹🇷'],
        ['mls','🇺🇸'],['nwsl','🇺🇸'],
        ['a-league','🇦🇺'],['ekstraklasa','🇵🇱'],
        ['primera division','🇦🇷'],['primera b','🇦🇷'],
        ['liga dimayor','🇨🇴'],['ligapro','🇪🇨'],
        ['vysshaya','🇧🇾'],['toplyga','🇺🇦'],
        ['v-league','🇻🇳'],['thai league','🇹🇭'],['indonesi','🇮🇩'],
        ['super league','🇨🇭'],['parva liga','🇧🇬'],['premium liiga','🇪🇪'],
        ['veikkausliiga','🇫🇮'],['virsliga','🇱🇻'],
        ['superettan','🇸🇪'],['ettan','🇸🇪'],
        ['liga 2','🇷🇴'],['liga 3','🇷🇴'],['1. mfl','🇲🇰'],['wwin','🇧🇦'],
    ];
    for (const [key, flag] of flags) {
        if (n.includes(key)) return flag;
    }
    return '⚽';
}

function formatSG(sg) {
    if (sg === '-' || sg === '' || sg === undefined || sg === null) return '-';
    const n = typeof sg === 'number' ? sg : parseInt(sg);
    if (isNaN(n)) return String(sg);
    return n > 0 ? '+' + n : String(n);
}

function agruparPorLiga(jogos) {
    const mapa = {};
    jogos.forEach(g => {
        const k = g.league || '⚽ FUTEBOL';
        if (!mapa[k]) mapa[k] = { name: k, games: [] };
        mapa[k].games.push(g);
    });
    return Object.values(mapa).sort((a, b) => {
        const aLive = a.games.some(g => g.alert);
        const bLive = b.games.some(g => g.alert);
        if (aLive && !bLive) return -1;
        if (!aLive && bLive) return 1;
        return b.games.length - a.games.length;
    });
}

// ═══════════════════════════════════════════════════
//  DATA ENGINE — ETL → Internal Format
// ═══════════════════════════════════════════════════
function processarDadosCompletos(matches) {
    const fusoBR = { timeZone: "America/Sao_Paulo" };
    const hojeDisplay = todayBRDisplay();
    const jogos = [];

    matches.forEach(match => {
        const utc = new Date(match.utcDate);
        if (utc.toLocaleDateString("pt-BR", fusoBR) !== hojeDisplay) return;

        const compName = match.competition.name;
        const flag = getLeagueFlag(compName);
        const liga = flag + ' ' + compName.toUpperCase();

        let horario = utc.toLocaleTimeString("pt-BR", { hour:"2-digit", minute:"2-digit", timeZone:"America/Sao_Paulo" });
        let statusClass = "text-gray-400", alert = "";

        if (match.status === "IN_PLAY" || match.status === "PAUSED") {
            horario = match.minute ? match.minute + "'" : "AO VIVO";
            statusClass = "text-trading-highlight animate-pulse";
            alert = match.status === "PAUSED" ? "INTERVALO" : "AO VIVO";
        } else if (match.status === "FINISHED") {
            horario = "ENCERRADO"; statusClass = "text-gray-500";
        } else if (match.status === "POSTPONED" || match.status === "CANCELLED") {
            horario = match.status === "POSTPONED" ? "ADIADO" : "CANCELADO";
            statusClass = "text-red-500";
            alert = horario;
        }

        const gh = match.score?.fullTime?.home;
        const ga = match.score?.fullTime?.away;
        const intl = match.inteligencia || {};
        const clubelo = intl.clubelo || {};
        const form = intl.recent_form || {};
        const std = intl.standings || {};
        const stdH = std.home || { pos:"-", pts:"-", p:"-", sg:"-" };
        const stdA = std.away || { pos:"-", pts:"-", p:"-", sg:"-" };

        const hasStandings = stdH.pos && stdH.pos !== "-" && stdH.pos !== 0;
        const type = hasStandings ? "pontos_corridos" : "mata_mata";

        jogos.push({
            id: String(match.id),
            type,
            home: match.homeTeam.shortName || match.homeTeam.name,
            away: match.awayTeam.shortName || match.awayTeam.name,
            league: liga,
            time: horario, statusClass,
            scoreHome: gh != null ? String(gh) : "",
            scoreAway: ga != null ? String(ga) : "",
            venue: (match.venue || "").toUpperCase(),
            alert,
            eloHome: clubelo.home_elo || "N/A",
            eloAway: clubelo.away_elo || "N/A",
            formHome: Array.isArray(form.home) ? form.home : ["-","-","-","-","-"],
            formAway: Array.isArray(form.away) ? form.away : ["-","-","-","-","-"],
            standings: {
                home: { pos: stdH.pos || "-", pts: stdH.pts || "-", p: stdH.p || "-", sg: formatSG(stdH.sg) },
                away: { pos: stdA.pos || "-", pts: stdA.pts || "-", p: stdA.p || "-", sg: formatSG(stdA.sg) }
            },
            h2h: intl.h2h || [],
            stats: intl.stats || { info:"Sem dados disponíveis.", reliability:"N/A" }
        });
    });

    liveGamesData = agruparPorLiga(jogos);
    document.getElementById('game-count').innerText = jogos.length;
    document.getElementById('loading-ferrari')?.remove();
    renderAgenda();
    return jogos.length;
}

// ═══════════════════════════════════════════════════
//  AUTO-REFRESH (a cada 2 minutos)
// ═══════════════════════════════════════════════════
async function refreshScores() {
    try {
        const r = await fetch("jogos_de_hoje.json?v=" + Date.now());
        if (!r.ok) return;
        const txt = await r.text();
        if (!txt || txt.trim().startsWith("<!")) return;
        const parsed = JSON.parse(txt);
        if (parsed.matches && parsed.matches.length > 0) {
            const scrollPos = window.scrollY;
            processarDadosCompletos(parsed.matches);
            requestAnimationFrame(() => window.scrollTo(0, scrollPos));
        }
    } catch(e) { console.warn("Refresh:", e); }
}

function startAutoRefresh() {
    if (refreshTimer) clearInterval(refreshTimer);
    refreshTimer = setInterval(refreshScores, REFRESH_MS);
}

// ═══════════════════════════════════════════════════
//  MOTOR PRINCIPAL — JSON Sofascore → Fallback
// ═══════════════════════════════════════════════════
async function carregarCombustivel() {
    const badge = document.getElementById('fonte-badge');

    try {
        const r = await fetch("jogos_de_hoje.json?v=" + Date.now());
        if (r.ok) {
            const txt = await r.text();
            if (txt && txt.trim() && !txt.trim().startsWith("<!")) {
                const parsed = JSON.parse(txt);
                if (parsed.matches && parsed.matches.length > 0) {
                    const count = processarDadosCompletos(parsed.matches);
                    if (count > 0) {
                        const fonte = parsed._fonte || "ETL";
                        badge.innerHTML = '<span class="bg-green-900/50 text-green-400 text-[8px] font-black px-2 py-0.5 rounded uppercase border border-green-500/30">\u25CF ' + count + ' JOGOS \u2014 ' + fonte.toUpperCase() + '</span>';
                        startAutoRefresh();
                        return;
                    }
                }
            }
        }
    } catch(e) { /* JSON indisponível */ }

    // Fallback demonstração
    console.info("JSON indisponível ou sem jogos de hoje. Usando dados de demonstração.");
    liveGamesData = agruparPorLiga(FALLBACK_MATCHES);
    document.getElementById('game-count').innerText = FALLBACK_MATCHES.length;
    document.getElementById('loading-ferrari')?.remove();
    badge.innerHTML = '<span class="bg-yellow-900/50 text-yellow-400 text-[8px] font-black px-2 py-0.5 rounded uppercase border border-yellow-500/30">\u25CF MODO DEMONSTRA\u00C7\u00C3O</span>';
    renderAgenda();
}

// ═══════════════════════════════════════════════════
//  UI HELPERS
// ═══════════════════════════════════════════════════
function toggleFav(id) {
    id = String(id);
    favorites = favorites.includes(id) ? favorites.filter(f => f !== id) : [...favorites, id];
    localStorage.setItem('futTraderFavs', JSON.stringify(favorites));
    renderAgenda();
}

function switchTab(id, aba) {
    const c = document.getElementById('details-' + id);
    if (!c) return;
    c.querySelectorAll('.tab-content-' + id).forEach(x => x.classList.add('hidden'));
    c.querySelectorAll('.tab-btn-' + id).forEach(x => x.classList.remove('active'));
    const content = document.getElementById('content-' + aba + '-' + id);
    const tab = document.getElementById('tab-' + aba + '-' + id);
    if (content) content.classList.remove('hidden');
    if (tab) tab.classList.add('active');
}

function toggleDetails(id) {
    const el = document.getElementById('details-' + id);
    if (!el) return;
    const opening = el.classList.contains('hidden');
    el.classList.toggle('hidden');
    if (opening) switchTab(id, 'resumo');
}

function renderFormDots(formArray) {
    return formArray.map(function(resultado) {
        var colorClass = 'bg-trading-draw';
        if (resultado === 'V') colorClass = 'bg-trading-win';
        if (resultado === 'D') colorClass = 'bg-trading-loss';
        return '<div class="form-dot ' + colorClass + '">' + resultado + '</div>';
    }).join('');
}

// ═══════════════════════════════════════════════════
//  RENDER — LATARIA PERFEITA
// ═══════════════════════════════════════════════════
function renderAgenda() {
    var list = document.getElementById('agenda-list');
    var search = document.getElementById('agendaSearch').value.toUpperCase();

    // Preservar painéis abertos
    var openPanels = {};
    document.querySelectorAll('[id^="details-"]').forEach(function(el) {
        if (!el.classList.contains('hidden')) {
            var gid = el.id.replace('details-', '');
            var activeBtn = el.querySelector('.tab-btn.active');
            var tab = 'resumo';
            if (activeBtn) {
                var m = activeBtn.id.match(/^tab-(\w+)-/);
                if (m) tab = m[1];
            }
            openPanels[gid] = tab;
        }
    });

    list.innerHTML = '';

    var copy = JSON.parse(JSON.stringify(liveGamesData));
    var favGames = [];

    copy.forEach(function(league) {
        league.games = league.games.filter(function(g) {
            if (!g.home.toUpperCase().includes(search) && !g.away.toUpperCase().includes(search) && !league.name.toUpperCase().includes(search)) return false;
            if (favorites.includes(g.id)) { favGames.push(g); return false; }
            return true;
        });
    });

    var display = [];
    if (favGames.length > 0) display.push({ name:"\u2B50 EVENTOS FAVORITOS", isFavSection:true, games:favGames });
    copy.forEach(function(l) { if (l.games.length > 0) display.push(l); });

    if (display.length === 0) {
        list.innerHTML = '<div class="text-center py-20 text-gray-500 text-xs font-bold uppercase">Nenhum evento encontrado.</div>';
        return;
    }

    var fullHtml = '';

    display.forEach(function(league) {
        var headerColor = league.isFavSection ? "text-trading-highlight" : "text-white";
        var html = '<div class="league-section animate-in">' +
            '<div class="flex items-center gap-3 mb-3 px-2">' +
                '<div class="w-1 h-4 bg-trading-highlight rounded-full ' + (league.isFavSection ? 'animate-pulse' : '') + '"></div>' +
                '<span class="text-[11px] font-black ' + headerColor + ' uppercase tracking-[2px]">' + league.name + '</span>' +
                '<span class="text-[9px] text-gray-600 font-bold">' + league.games.length + ' jogo' + (league.games.length > 1 ? 's' : '') + '</span>' +
            '</div>' +
            '<div class="bg-trading-panel rounded-xl border ' + (league.isFavSection ? 'border-trading-highlight/30' : 'border-trading-border') + ' overflow-hidden divide-y divide-white/5 shadow-xl">';

        league.games.forEach(function(game) {
            var isFav = favorites.includes(game.id);
            var stdH = game.standings.home;

                                        '<div class="text-center">' +
                                            '<p class="text-[9px] text-gray-400 uppercase font-bold mb-1">' + game.home.substring(0, 8) + '</p>' +
                                            '<p class="text-lg font-black text-white">' + game.eloHome + '</p>' +
                                        '</div>' +
                                        '<span class="text-gray-600 text-[10px] mx-2 font-black italic">VS</span>' +
                                        '<div class="text-center">' +
                                            '<p class="text-[9px] text-gray-400 uppercase font-bold mb-1">' + game.away.substring(0, 8) + '</p>' +
                                            '<p class="text-lg font-black text-white">' + game.eloAway + '</p>' +
                                        '</div>' +
                                    '</div>' +
                                '</div>' +

                            '</div>' +
                            '<div id="content-class-' + game.id + '" class="tab-content-' + game.id + ' hidden animate-in">' + classHtml + '</div>' +
                            '<div id="content-h2h-' + game.id + '" class="tab-content-' + game.id + ' hidden animate-in">' + h2hHtml + '</div>' +
                            '<div id="content-top-' + game.id + '" class="tab-content-' + game.id + ' hidden animate-in">' + statsHtml + '</div>' +
                        '</div>' +
                    '</div>' +
                '</div>';
        });

        html += '</div></div>';
        fullHtml += html;
    });

    list.innerHTML = fullHtml;

    // Restaurar painéis abertos
    for (var gid in openPanels) {
        var el = document.getElementById('details-' + gid);
        if (el) {
            el.classList.remove('hidden');
            switchTab(gid, openPanels[gid]);
        }
    }
}
