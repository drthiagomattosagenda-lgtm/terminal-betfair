<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QG Fut Trader - Central de Inteligência</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        trading: {
                            dark: '#0B0E14',
                            panel: '#151A22',
                            border: '#2A3241',
                            highlight: '#FFB100',
                            win: '#10B981',
                            loss: '#EF4444',
                            draw: '#718096',
                            awayTeam: '#3B82F6'
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body { background-color: #0B0E14; color: #E2E8F0; font-family: 'Inter', sans-serif; }
        .nav-links { display: flex; gap: 20px; list-style: none; }
        .nav-links a { color: #718096; font-size: 14px; font-weight: 600; text-decoration: none; transition: 0.3s; }
        .nav-links a:hover { color: #FFB100; }
        
        .tab-btn { color: #718096; font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; transition: 0.2s; position: relative; padding-bottom: 12px; }
        .tab-btn.active { color: #FFB100; }
        .tab-btn.active::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 2px; background: #FFB100; }
        
        .form-dot { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; color: white; text-shadow: 0 1px 2px rgba(0,0,0,0.5); }
        .animate-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="antialiased selection:bg-trading-highlight selection:text-black">

    <nav class="border-b border-trading-border p-4 mb-8 bg-trading-dark sticky top-0 z-50 shadow-md">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="text-xl font-black italic tracking-tighter text-white">FUT <span class="text-trading-highlight">TRADER</span></div>
            <ul class="nav-links">
                <li><a href="inicio.html" class="text-trading-highlight">Início</a></li>
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="aovivo.html">Ao Vivo</a></li>
                <li><a href="index.html" class="text-red-500 hover:text-red-400">Sair</a></li>
            </ul>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-4 min-h-screen">
        <div class="flex flex-col md:flex-row justify-between items-end mb-10 gap-6">
            <div>
                <h1 class="text-4xl font-black text-white tracking-tighter uppercase italic leading-none">QUARTEL <span class="text-trading-highlight">GENERAL</span></h1>
                <p class="text-gray-500 text-xs mt-2 font-medium tracking-wide">Monitorando <span id="game-count" class="text-white font-bold">...</span> eventos em tempo real.</p>
            </div>
            <div class="w-full md:w-auto relative">
                <i class="fas fa-search absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-500"></i>
                <input type="text" id="agendaSearch" oninput="renderAgenda()" placeholder="Filtrar time ou liga..." 
                class="w-full md:w-80 bg-trading-panel border border-trading-border rounded-xl py-3 pl-10 pr-6 text-xs focus:outline-none focus:border-trading-highlight text-white shadow-2xl transition-all">
            </div>
        </div>

        <div id="agenda-list" class="space-y-10 pb-20">
            <div id="loading-ferrari" class="text-center py-20 animate-pulse">
                <i class="fas fa-gas-pump text-trading-highlight text-4xl mb-4"></i>
                <p class="text-gray-500 text-xs uppercase font-black tracking-widest">Injetando combustível real...</p>
            </div>
        </div>
    </main>

    <script>
        // ======= O MOTOR V12 DE DADOS ======= //
        let liveGamesData = []; 
        let favorites = [];
        
        try { favorites = JSON.parse(localStorage.getItem('futTraderFavs')) || []; } catch(e) { favorites = []; }

        async function carregarCombustivel() {
            const url = "jogos_de_hoje.json?v=" + new Date().getTime();
            
            try {
                const resposta = await fetch(url);
                
                if (!resposta.ok) {
                    throw new Error("Tanque Vazio");
                }
                
                const dados = await resposta.json();
                const ligasAgrupadas = {};

                const dataHojeBR = new Date().toLocaleDateString("pt-BR", { timeZone: "America/Sao_Paulo" });

                dados.matches.forEach(match => {
                    const dataJogoBR = new Date(match.utcDate).toLocaleDateString("pt-BR", { timeZone: "America/Sao_Paulo" });

                    if (dataJogoBR !== dataHojeBR) {
                        return; 
                    }

                    const nomeLiga = match.competition.name.toUpperCase();
                    
                    if (!ligasAgrupadas[nomeLiga]) {
                        ligasAgrupadas[nomeLiga] = { name: nomeLiga, games: [] };
                    }

                    let horarioStr = new Date(match.utcDate).toLocaleTimeString("pt-BR", { hour: "2-digit", minute: "2-digit", timeZone: "America/Sao_Paulo" });
                    let statusClass = "text-gray-400";
                    let alerta = "";
                    
                    if (match.status === "IN_PLAY" || match.status === "PAUSED") {
                        horarioStr = match.minute ? `${match.minute}'` : "AO VIVO";
                        statusClass = "text-trading-highlight animate-pulse";
                        alerta = match.status === "PAUSED" ? "INTERVALO" : "AO VIVO";
                    } else if (match.status === "FINISHED") {
                        horarioStr = "ENCERRADO";
                        statusClass = "text-gray-500";
                    } else if (match.status === "POSTPONED" || match.status === "CANCELLED") {
                        horarioStr = match.status === "POSTPONED" ? "ADIADO" : "CANCELADO";
                        statusClass = "text-red-500";
                    }

                    const golsCasa = match.score.fullTime.home !== null ? match.score.fullTime.home.toString() : "";
                    const golsFora = match.score.fullTime.away !== null ? match.score.fullTime.away.toString() : "";

                    // Puxando os dados de inteligência injetados pelo Python (se existirem)
                    const inteligencia = match.inteligencia || { 
                        clubelo: { home_elo: 'N/A', away_elo: 'N/A' }, 
                        recent_form: { home: ['-','-','-','-','-'], away: ['-','-','-','-','-'] } 
                    };

                    ligasAgrupadas[nomeLiga].games.push({
                        id: match.id.toString(),
                        type: "pontos_corridos", 
                        time: horarioStr,
                        statusClass: statusClass,
                        home: match.homeTeam.shortName || match.homeTeam.name,
                        away: match.awayTeam.shortName || match.awayTeam.name,
                        scoreHome: golsCasa,
                        scoreAway: golsFora,
                        venue: "ESTÁDIO",
                        alert: alerta,
                        // Novas variáveis V12:
                        eloHome: inteligencia.clubelo.home_elo,
                        eloAway: inteligencia.clubelo.away_elo,
                        formHome: inteligencia.recent_form.home,
                        formAway: inteligencia.recent_form.away
                    });
                });

                liveGamesData = Object.values(ligasAgrupadas);
                
                const totalJogos = liveGamesData.reduce((acc, liga) => acc + liga.games.length, 0);
                document.getElementById('game-count').innerText = totalJogos;

                const loadingInfo = document.getElementById('loading-ferrari');
                if (loadingInfo) loadingInfo.remove();

                renderAgenda();

            } catch (erro) {
                console.error("Falha no motor V12:", erro);
                document.getElementById('agenda-list').innerHTML = `
                    <div class="text-center py-10 bg-red-900/20 border border-red-500/30 rounded-xl">
                        <p class="text-red-500 text-xs font-black uppercase">O Tanque está vazio!</p>
                        <p class="text-gray-400 text-[10px] mt-4">Aguardando telemetria...</p>
                    </div>
                `;
            }
        }

        // ======= FUNÇÕES DA LATARIA ======= //
        function toggleFav(id) {
            id = String(id);
            if (favorites.includes(id)) { favorites = favorites.filter(f => f !== id); } 
            else { favorites.push(id); }
            localStorage.setItem('futTraderFavs', JSON.stringify(favorites));
            renderAgenda(); 
        }

        function switchTab(id, aba) {
            const container = document.getElementById(`details-${id}`);
            if(!container) return; 
            container.querySelectorAll(`.tab-content-${id}`).forEach(c => c.classList.add('hidden'));
            container.querySelectorAll(`.tab-btn-${id}`).forEach(b => b.classList.remove('active'));
            const content = document.getElementById(`content-${aba}-${id}`);
            const tab = document.getElementById(`tab-${aba}-${id}`);
            if (content) content.classList.remove('hidden');
            if (tab) tab.classList.add('active');
        }

        function toggleDetails(id) { 
            const el = document.getElementById(`details-${id}`);
            if(el) {
                const isOpening = el.classList.contains('hidden');
                el.classList.toggle('hidden');
                if (isOpening) switchTab(id, 'resumo');
            }
        }

        // Função auxiliar para pintar as bolinhas do Momento Recente dinamicamente
        function renderFormDots(formArray) {
            return formArray.map(resultado => {
                let colorClass = 'bg-trading-draw';
                if (resultado === 'V') colorClass = 'bg-trading-win';
                if (resultado === 'D') colorClass = 'bg-trading-loss';
                return `<div class="form-dot ${colorClass}">${resultado}</div>`;
            }).join('');
        }

        function renderAgenda() {
            const list = document.getElementById('agenda-list');
            const search = document.getElementById('agendaSearch').value.toUpperCase();
            list.innerHTML = '';

            let leaguesCopy = JSON.parse(JSON.stringify(liveGamesData));
            let favGames = [];

            leaguesCopy.forEach(league => {
                league.games = league.games.filter(g => {
                    const home = g.home.toUpperCase(); const away = g.away.toUpperCase(); const lname = league.name.toUpperCase();
                    if (!(home.includes(search) || away.includes(search) || lname.includes(search))) return false; 
                    if (favorites.includes(g.id)) { favGames.push(g); return false; }
                    return true;
                });
            });

            let displayData = [];
            if (favGames.length > 0) displayData.push({ name: "⭐ EVENTOS FAVORITOS", isFavSection: true, games: favGames });
            leaguesCopy.forEach(league => { if(league.games.length > 0) displayData.push(league); });

            if(displayData.length === 0) {
                list.innerHTML = `<div class="text-center py-20 text-gray-500 text-xs font-bold uppercase">Nenhum evento encontrado.</div>`;
                return;
            }

            displayData.forEach(league => {
                const headerColor = league.isFavSection ? "text-trading-highlight" : "text-white";
                let html = `
                    <div class="league-section animate-in">
                        <div class="flex items-center gap-3 mb-3 px-2">
                            <div class="w-1 h-4 bg-trading-highlight rounded-full ${league.isFavSection ? 'animate-pulse' : ''}"></div>
                            <span class="text-[11px] font-black ${headerColor} uppercase tracking-[2px]">${league.name}</span>
                        </div>
                        <div class="bg-trading-panel rounded-xl border ${league.isFavSection ? 'border-trading-highlight/30' : 'border-trading-border'} overflow-hidden divide-y divide-white/5 shadow-xl">
                `;

                league.games.forEach(game => {
                    const isFav = favorites.includes(game.id);
                    let scoreHtml = (game.scoreHome !== "" || game.scoreAway !== "") 
                        ? `<span class="text-lg md:text-xl font-black text-trading-highlight mx-2">${game.scoreHome}</span><span class="text-[9px] text-gray-500 font-black italic bg-black/40 px-2 py-1 rounded">VS</span><span class="text-lg md:text-xl font-black text-trading-highlight mx-2">${game.scoreAway}</span>`
                        : `<span class="text-[9px] text-gray-500 font-black italic bg-black/40 px-2 py-1 rounded mx-3">VS</span>`;
                    let alertHtml = game.alert ? `<span class="bg-red-600 text-white text-[8px] font-black uppercase px-2 py-0.5 rounded shadow-[0_0_8px_rgba(220,38,38,0.8)] ml-3 animate-pulse border border-red-400">${game.alert}</span>` : '';

                    let classHtml = `<div class="text-center py-10 text-gray-600 text-xs">Módulo de Classificação em construção...</div>`;
                    let h2hHtml = `<div class="text-center py-10 text-gray-600 text-xs">Módulo H2H Avançado em construção...</div>`;
                    let statsHtml = `<div class="text-center py-10 text-gray-600 text-xs">Módulo de Destaques em construção...</div>`;

                    html += `
                        <div class="game-item relative">
                            <div class="p-5 md:p-6 flex items-center justify-between cursor-pointer hover:bg-white/[0.02] transition-colors" onclick="toggleDetails('${game.id}')">
                                <div class="flex items-center gap-4 md:gap-8 w-full">
                                    <div class="text-center min-w-[50px] md:min-w-[60px]">
                                        <p class="${game.statusClass} font-mono font-black text-xs md:text-sm uppercase tracking-tighter">${game.time}</p>
                                    </div>
                                    <div class="flex flex-col flex-1">
                                        <div class="flex items-center flex-wrap">
                                            <span class="text-sm md:text-base font-black text-white uppercase tracking-tight">${game.home}</span>
                                            ${scoreHtml}
                                            <span class="text-sm md:text-base font-black text-white uppercase tracking-tight">${game.away}</span>
                                            ${alertHtml}
                                        </div>
                                        <span class="text-[9px] text-gray-500 uppercase mt-2 tracking-wider truncate max-w-xs"><i class="fas fa-map-marker-alt mr-1 text-gray-600"></i>${game.venue}</span>
                                    </div>
                                </div>
                                <div class="flex items-center pl-2">
                                    <button onclick="event.stopPropagation(); toggleFav('${game.id}')" class="focus:outline-none p-3">
                                        <i class="fa-star ${isFav ? 'fas text-trading-highlight drop-shadow-[0_0_5px_rgba(255,177,0,0.5)]' : 'far text-gray-700'} text-xl md:text-2xl transition-transform hover:scale-125"></i>
                                    </button>
                                </div>
                            </div>

                            <div id="details-${game.id}" class="hidden bg-[#0D1117] border-t border-white/5 shadow-inner">
                                <div class="flex gap-6 md:gap-8 px-6 md:px-8 border-b border-white/5 overflow-x-auto no-scrollbar pt-4">
                                    <button onclick="switchTab('${game.id}', 'resumo')" id="tab-resumo-${game.id}" class="tab-btn tab-btn-${game.id} active whitespace-nowrap">RESUMO</button>
                                    <button onclick="switchTab('${game.id}', 'class')" id="tab-class-${game.id}" class="tab-btn tab-btn-${game.id} whitespace-nowrap">CLASSIFICAÇÃO</button>
                                    <button onclick="switchTab('${game.id}', 'h2h')" id="tab-h2h-${game.id}" class="tab-btn tab-btn-${game.id} whitespace-nowrap">H2H DETALHADO</button>
                                    <button onclick="switchTab('${game.id}', 'top')" id="tab-top-${game.id}" class="tab-btn tab-btn-${game.id} whitespace-nowrap">DESTAQUES</button>
                                </div>

                                <div class="p-6 md:p-8 relative min-h-[150px]">
                                    <div id="content-resumo-${game.id}" class="tab-content-${game.id} grid grid-cols-1 md:grid-cols-3 gap-6 animate-in">
                                        
                                        <div class="space-y-3 bg-white/[0.02] p-4 rounded-xl border border-white/5">
                                            <h4 class="text-[9px] text-gray-500 font-black uppercase tracking-widest">Momento Recente</h4>
                                            <div class="flex items-center gap-4">
                                                <div class="flex gap-1">${renderFormDots(game.formHome)}</div>
                                                <div class="w-px h-6 bg-white/10"></div>
                                                <div class="flex gap-1">${renderFormDots(game.formAway)}</div>
                                            </div>
                                        </div>
                                        
                                        <div class="space-y-3 bg-white/[0.02] p-4 rounded-xl border border-white/5">
                                            <h4 class="text-[9px] text-gray-500 font-black uppercase tracking-widest">Status da Partida</h4>
                                            <p class="text-[11px] text-white/70">Situação: <span class="text-white font-bold ml-1">${game.time}</span></p>
                                            <p class="text-[11px] text-white/70 truncate">Local: <span class="text-white font-bold ml-1">${game.venue}</span></p>
                                        </div>
                                        
                                        <div class="bg-trading-highlight/10 p-4 rounded-xl border-l-4 border-trading-highlight flex flex-col justify-center">
                                            <h4 class="text-[9px] text-trading-highlight font-black uppercase mb-1 tracking-widest">Análise ClubElo</h4>
                                            <div class="flex justify-between items-center mt-2">
                                                <div class="text-center">
                                                    <p class="text-[9px] text-gray-400 uppercase font-bold mb-1">${game.home.substring(0, 8)}</p>
                                                    <p class="text-lg font-black text-white">${game.eloHome}</p>
                                                </div>
                                                <span class="text-gray-600 text-[10px] mx-2 font-black italic">VS</span>
                                                <div class="text-center">
                                                    <p class="text-[9px] text-gray-400 uppercase font-bold mb-1">${game.away.substring(0, 8)}</p>
                                                    <p class="text-lg font-black text-white">${game.eloAway}</p>
                                                </div>
                                            </div>
                                        </div>
                                        
                                    </div>
                                    <div id="content-class-${game.id}" class="tab-content-${game.id} hidden animate-in">${classHtml}</div>
                                    <div id="content-h2h-${game.id}" class="tab-content-${game.id} hidden animate-in">${h2hHtml}</div>
                                    <div id="content-top-${game.id}" class="tab-content-${game.id} hidden animate-in">${statsHtml}</div>
                                </div>
                            </div>
                        </div>
                    `;
                });
                html += `</div></div>`;
                list.innerHTML += html;
            });
        }

        window.onload = () => { carregarCombustivel(); };
    </script>
</body>
</html>
