<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fut Trader - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <img src="https://www.betfair.com/ads/creative/betfair-logo-en.png" alt="Betfair" style="width: 150px; margin-bottom: 20px;">
        
        <h1>Portal Fut Trader</h1>
        <p>Acesse as melhores oportunidades para o seu trading</p>
        
        <div id="buttonDiv"></div> 
    </div>

    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    <script>
      // Função executada após o login bem-sucedido
      function handleCredentialResponse(response) {
          console.log("Login realizado com sucesso!");
          
          // Opcional: Alerta de confirmação (pode remover se preferir algo mais direto)
          alert("Login realizado! Entrando no seu Quartel General...");

          // MUDANÇA CIRÚRGICA: O usuário agora cai direto na página de Início (Agenda)
          window.location.href = "inicio.html"; 
      }

      // Configuração inicial do Google Sign-In
      window.onload = function () {
        google.accounts.id.initialize({
          client_id: "55444728820-elc9cufjb3l5mk4fvtlp1bho6ribua05.apps.googleusercontent.com",
          callback: handleCredentialResponse
        });
        
        // Renderização visual do botão (Design Pill/Outline)
        google.accounts.id.renderButton(
          document.getElementById("buttonDiv"),
          { 
            theme: "outline", 
            size: "large", 
            text: "signin_with", 
            shape: "pill" 
          }  
        );
        
        // Ativa o One Tap (login rápido flutuante)
        google.accounts.id.prompt(); 
      }
    </script>
</body>
</html>
