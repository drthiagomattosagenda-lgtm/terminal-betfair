<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal Live - Fut Trader Pro</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        trading: {
                            dark: '#0B0E14',
                            panel: '#151A22',
                            border: '#2A3241',
                            home: '#10B981', 
                            away: '#EF4444', 
                            highlight: '#FFB100',
                            pressure: '#7C3AED'
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body { background-color: #0B0E14; color: #E2E8F0; margin: 0; }
        
        .chart-90-min {
            height: 140px;
            display: grid;
            grid-template-columns: repeat(90, 1fr);
            gap: 1px;
            background: rgba(0,0,0,0.5);
            padding: 0 5px;
            border-radius: 4px;
            position: relative;
            overflow: hidden;
            border: 1px solid #2A3241;
        }

        .center-line {
            position: absolute;
            left: 0;
            right: 0;
            top: 50%;
            height: 1px;
            background: rgba(255,255,255,0.2);
            z-index: 5;
            pointer-events: none;
        }

        .minute-slot { height: 100%; position: relative; z-index: 2; }

        .bar-home {
            background-color: #10B981;
            width: 100%;
            position: absolute;
            bottom: 50%;
            left: 0;
            border-radius: 1px 1px 0 0;
        }

        .bar-away {
            background-color: #EF4444;
            width: 100%;
            position: absolute;
            top: 50%;
            left: 0;
            border-radius: 0 0 1px 1px;
        }

        /* --- NOVOS MARCADORES DE CHUTE --- */
        .marker {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 50%;
            z-index: 10;
        }

        /* Chute no Alvo (Símbolo Maior) */
        .marker-alvo {
            width: 6px;
            height: 6px;
            background-color: #FFF;
            box-shadow: 0 0 5px #FFF;
        }

        /* Chute ao Lado (Símbolo Menor) */
        .marker-lado {
            width: 3px;
            height: 3px;
            background-color: #FFB100;
        }

        /* Posicionamento Mandante (Acima da Barra Verde) */
        .home-marker { bottom: 10px; } 
        
        /* Posicionamento Visitante (Abaixo da Barra Vermelha) */
        .away-marker { top: 10px; }

        .card-high-pressure {
            border: 2px solid #7C3AED !important;
            box-shadow: 0 0 25px rgba(124, 58, 237, 0.4);
            background: linear-gradient(to bottom, #151A22, #1a0b2e) !important;
        }

        .navbar { display: flex !important; }
    </style>
</head>
<body class="antialiased">

    <nav class="navbar">
        <div class="logo"><span>FUT</span> TRADER</div>
        <ul class="nav-links">
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="aovivo.html">Ao Vivo</a></li>
            <li><a href="comunidade.html">Comunidade</a></li>
            <li><a href="index.html" class="text-red-500">Sair</a></li>
        </ul>
    </nav>

    <div class="bg-trading-panel border-b border-trading-border p-3 sticky top-[70px] z-40">
        <div class="max-w-7xl mx-auto flex flex-wrap items-center justify-between gap-4">
            <div class="flex gap-2">
                <button class="bg-trading-highlight text-black px-4 py-1.5 rounded text-xs font-bold uppercase">Todos</button>
                <button class="bg-trading-dark px-4 py-1.5 rounded text-xs font-bold border border-trading-border"><i class="fas fa-star text-yellow-500 mr-1"></i> Favoritos</button>
                <button class="bg-trading-dark px-4 py-1.5 rounded text-xs font-bold border border-trading-border">1º Tempo</button>
                <button class="bg-trading-dark px-4 py-1.5 rounded text-xs font-bold border border-trading-border">2º Tempo</button>
                <button class="bg-trading-dark px-4 py-1.5 rounded text-xs font-bold border border-trading-border text-trading-pressure font-black">Alta Pressão</button>
            </div>
            <div class="relative">
                <input type="text" placeholder="🔎 Buscar jogo..." class="bg-trading-dark border border-trading-border rounded-full py-1.5 px-10 text-xs focus:outline-none focus:border-trading-highlight w-64">
                <i class="fas fa-search absolute left-4 top-2.5 text-trading-text opacity-50"></i>
            </div>
        </div>
    </div>

    <main class="max-w-[1400px] mx-auto p-6">
        <div id="live-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>

        <div class="flex justify-center items-center gap-6 mt-12 mb-10">
            <button class="bg-trading-panel border border-trading-border px-6 py-2 rounded text-sm font-bold hover:bg-trading-dark transition">Anterior</button>
            <span class="text-xs font-mono text-trading-text">Página <strong class="text-white">1</strong> de 22</span>
            <button class="bg-trading-panel border border-trading-border px-6 py-2 rounded text-sm font-bold hover:bg-trading-dark transition">Próxima</button>
        </div>
    </main>

    <script>
        const games = [
            { id: 1, home: "PAL", away: "FLA", score: "1 - 0", time: 43, possession: 55, pressure: 45 },
            { id: 2, home: "CITY", away: "LIV", score: "2 - 2", time: 78, possession: 48, pressure: 20 },
            { id: 3, home: "REA", away: "BAR", score: "0 - 0", time: 15, possession: 60, pressure: 10 }
        ];

        function renderGrid() {
            const grid = document.getElementById('live-grid');
            grid.innerHTML = '';

            for(let i=0; i<9; i++) {
                const game = games[i % 3];
                const isHighPressure = game.pressure > 40;
                
                grid.innerHTML += `
                    <div class="bg-trading-panel border border-trading-border rounded-xl p-4 transition-all ${isHighPressure ? 'card-high-pressure' : ''}">
                        <div class="flex justify-between items-center mb-4">
                            <div class="text-sm font-bold flex items-center gap-2">
                                <span class="text-trading-highlight">${game.home}</span> 
                                <span class="bg-trading-dark px-2 rounded">${game.score}</span> 
                                <span>${game.away}</span>
                                <span class="text-[10px] text-trading-edge font-mono ml-2">${game.time}'</span>
                            </div>
                            <i class="far fa-star text-sm cursor-pointer hover:text-yellow-500"></i>
                        </div>

                        <div class="chart-90-min">
                            <div class="center-line"></div>
                            ${generate90Bars(game.time)}
                        </div>

                        <div class="mt-4">
                            <div class="flex justify-between text-[9px] font-bold mb-1 uppercase tracking-tighter">
                                <span>Posse: ${game.possession}%</span>
                                <span>${100 - game.possession}%</span>
                            </div>
                            <div class="h-1.5 w-full bg-gray-950 rounded-full flex overflow-hidden">
                                <div class="bg-trading-home" style="width: ${game.possession}%"></div>
                                <div class="bg-trading-away" style="width: ${100 - game.possession}%"></div>
                            </div>
                        </div>

                        <button onclick="document.getElementById('stats-${i}').classList.toggle('hidden')" class="w-full mt-4 py-1.5 bg-trading-dark border border-trading-border rounded text-[9px] font-bold tracking-widest uppercase hover:bg-trading-border transition">
                            <i class="fas fa-bolt mr-2 text-trading-highlight"></i> Detalhes da Partida
                        </button>

                        <div id="stats-${i}" class="hidden mt-4 pt-4 border-t border-trading-border space-y-3">
                            ${renderStatRow("1.25", "xG", "0.85")}
                            ${renderStatRow("88", "Ataques", "92")}
                            ${renderStatRow("45", "Ataques Perigosos", "42", true)}
                            ${renderStatRow("4", "Chute no Alvo", "3")}
                            ${renderStatRow("7", "Chute ao lado", "5")}
                        </div>
                    </div>
                `;
            }
        }

        function renderStatRow(homeVal, label, awayVal, highlight = false) {
            const textColor = highlight ? 'text-trading-highlight' : 'text-trading-text';
            return `
                <div class="grid grid-cols-3 items-center text-[11px] font-mono">
                    <span class="text-right text-white font-bold">${homeVal}</span>
                    <span class="text-center ${textColor} text-[9px] uppercase font-bold tracking-tighter">${label}</span>
                    <span class="text-left text-white font-bold">${awayVal}</span>
                </div>
            `;
        }

        function generate90Bars(currentMinute) {
            let html = '';
            for(let m = 1; m <= 90; m++) {
                if(m <= currentMinute) {
                    const intensity = Math.floor(Math.random() * 50) + 1;
                    const heightPercent = (intensity / 50) * 100;
                    const isHome = Math.random() > 0.4;

                    // Lógica para os marcadores solicitados
                    let markerHtml = '';
                    const eventChance = Math.random();
                    const markerPosClass = isHome ? 'home-marker' : 'away-marker';

                    if (eventChance > 0.95) {
                        // Chute no Alvo (Símbolo Maior)
                        markerHtml = `<div class="marker marker-alvo ${markerPosClass}"></div>`;
                    } else if (eventChance > 0.88) {
                        // Chute ao Lado (Símbolo Menor)
                        markerHtml = `<div class="marker marker-lado ${markerPosClass}"></div>`;
                    }

                    html += `
                        <div class="minute-slot">
                            ${markerHtml}
                            <div class="${isHome ? 'bar-home' : 'bar-away'}" style="height: ${heightPercent}%"></div>
                        </div>
                    `;
                } else {
                    html += `<div class="minute-slot"></div>`;
                }
            }
            return html;
        }

        renderGrid();
    </script>
</body>
</html>
