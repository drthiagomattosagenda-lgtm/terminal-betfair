<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QG Fut Trader - Central de Inteligência</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        trading: {
                            dark: '#0B0E14',
                            panel: '#151A22',
                            border: '#2A3241',
                            highlight: '#FFB100',
                            win: '#10B981',
                            loss: '#EF4444',
                            draw: '#718096'
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body { background-color: #0B0E14; color: #E2E8F0; font-family: 'Inter', sans-serif; }
        .nav-links { display: flex; gap: 20px; list-style: none; }
        .nav-links a { color: #718096; font-size: 14px; font-weight: 600; text-decoration: none; transition: 0.3s; }
        .nav-links a:hover { color: #FFB100; }
        
        .tab-btn { color: #718096; font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; transition: 0.2s; position: relative; padding-bottom: 12px; }
        .tab-btn.active { color: #FFB100; }
        .tab-btn.active::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 2px; background: #FFB100; }
        
        .form-dot { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; color: white; }
        .animate-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="antialiased">

    <nav class="border-b border-trading-border p-4 mb-8">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="text-xl font-black italic tracking-tighter text-white">FUT <span class="text-trading-highlight">TRADER</span></div>
            <ul class="nav-links">
                <li><a href="inicio.html" class="text-trading-highlight">Início</a></li>
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="aovivo.html">Ao Vivo</a></li>
                <li><a href="index.html" class="text-red-500">Sair</a></li>
            </ul>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-4">
        <div class="flex flex-col md:flex-row justify-between items-end mb-10 gap-6">
            <div>
                <h1 class="text-4xl font-black text-white tracking-tighter uppercase italic leading-none">QUARTEL <span class="text-trading-highlight">GENERAL</span></h1>
                <p class="text-gray-500 text-xs mt-2 font-medium tracking-wide">Monitorando <span id="game-count" class="text-white">0</span> eventos em tempo real.</p>
            </div>
            <div class="w-full md:w-auto">
                <input type="text" id="agendaSearch" oninput="renderAgenda()" placeholder="🔎 Filtrar time ou liga..." 
                class="w-full md:w-80 bg-trading-panel border border-trading-border rounded-xl py-3 px-6 text-xs focus:outline-none focus:border-trading-highlight text-white shadow-2xl transition-all">
            </div>
        </div>

        <div id="loading-alert" class="text-center py-20">
            <i class="fas fa-circle-notch fa-spin text-trading-highlight text-3xl"></i>
            <p class="text-gray-500 mt-4 font-bold uppercase text-[10px] tracking-[3px]">Sincronizando Grade Global...</p>
        </div>

        <div id="agenda-list" class="space-y-10"></div>
    </main>

    <script>
        let gamesData = [];
        let favorites = JSON.parse(localStorage.getItem('futTraderFavs')) || [];

        // FUNÇÃO CIRÚRGICA: Trata o horário e finalização
        function tratarStatus(status) {
            if (!status) return "--:--";
            const finalizacoes = ["FT", "Final", "Ended", "Fim"];
            if (finalizacoes.some(f => status.includes(f))) return "FIM";
            return status.replace("AM", "").replace("PM", "").trim();
        }

        async function conectarAoMotor() {
            try {
                // Tenta buscar do Render (Seu Backend)
                const response = await fetch('https://motor-ferrari.onrender.com/jogos');
                const result = await response.json();

                if (result.sucesso && result.dados.length > 0) {
                    const grouped = result.dados.reduce((acc, game) => {
                        const key = game.league;
                        if (!acc[key]) acc[key] = { name: key, games: [] };
                        acc[key].games.push(game);
                        return acc;
                    }, {});

                    gamesData = Object.values(grouped);
                    document.getElementById('loading-alert').classList.add('hidden');
                    renderAgenda();
                }
            } catch (error) {
                console.error("Motor indisponível, tentando reconectar...", error);
                setTimeout(conectarAoMotor, 5000); 
            }
        }

        function renderAgenda() {
            const list = document.getElementById('agenda-list');
            const search = document.getElementById('agendaSearch').value.toUpperCase();
            let totalCount = 0;
            list.innerHTML = '';

            gamesData.forEach(league => {
                const filteredGames = league.games.filter(g => 
                    g.home.toUpperCase().includes(search) || g.away.toUpperCase().includes(search)
                );

                if (filteredGames.length > 0) {
                    let html = `
                        <div class="league-section animate-in">
                            <div class="flex items-center gap-3 mb-3 px-2">
                                <div class="w-1 h-4 bg-trading-highlight rounded-full"></div>
                                <span class="text-[11px] font-black text-white uppercase tracking-[2px]">${league.name}</span>
                            </div>
                            <div class="bg-trading-panel rounded-2xl border border-trading-border overflow-hidden divide-y divide-white/5 shadow-2xl">
                    `;

                    filteredGames.forEach(game => {
                        totalCount++;
                        const isFav = favorites.includes(String(game.id));
                        
                        // Lógica Mata-Mata
                        const copas = ["Copa", "Cup", "Champions", "Libertadores", "Trophy", "Mata-Mata", "Playoffs", "FA Cup"];
                        const ehMataMata = copas.some(c => league.name.includes(c));
                        
                        // Formatação do Tempo
                        const statusFormatado = tratarStatus(game.time);
                        const statusColor = statusFormatado === 'FIM' ? 'text-red-500' : 'text-trading-highlight';
                        
                        // ARQUITETURA SÊNIOR MANTIDA
                        html += `
                            <div class="game-item">
                                <div class="p-5 flex items-center justify-between cursor-pointer hover:bg-white/[0.02] transition" onclick="toggleDetails('${game.id}')">
                                    <div class="flex items-center gap-8">
                                        <div class="text-center min-w-[60px]">
                                            <p class="${statusColor} font-mono font-black text-sm uppercase">${statusFormatado}</p>
                                        </div>
                                        <div class="flex flex-col">
                                            <div class="flex items-center gap-4">
                                                <span class="text-base font-black text-white uppercase tracking-tight">${game.home}</span>
                                                <span class="text-[10px] text-gray-700 font-black italic">VS</span>
                                                <span class="text-base font-black text-white uppercase tracking-tight">${game.away}</span>
                                                
                                                ${ehMataMata ? `
                                                    <span class="bg-red-600/20 text-red-500 text-[8px] px-2 py-0.5 rounded border border-red-500/30 font-black uppercase tracking-tighter">
                                                        <i class="fas fa-trophy mr-1"></i>Mata-Mata
                                                    </span>
                                                ` : ''}
                                            </div>
                                            <span class="text-[9px] text-gray-500 uppercase mt-1 tracking-wider"><i class="fas fa-map-marker-alt mr-1"></i>${game.venue}</span>
                                        </div>
                                    </div>
                                    <div class="flex items-center gap-6">
                                        <div class="bg-black/40 px-4 py-2 rounded-xl border border-white/5 text-sm font-mono font-black text-white">${game.score}</div>
                                        <i onclick="event.stopPropagation(); toggleFav('${game.id}')" class="fa-star ${isFav ? 'fas text-trading-highlight' : 'far text-gray-700'} text-xl transition hover:scale-125"></i>
                                    </div>
                                </div>

                                <div id="details-${game.id}" class="hidden bg-[#0D1117] border-t border-white/5">
                                    <div class="flex gap-8 px-8 border-b border-white/5 overflow-x-auto no-scrollbar pt-4">
                                        <button onclick="switchTab('${game.id}', 'resumo')" id="tab-resumo-${game.id}" class="tab-btn active">Resumo</button>
                                        <button onclick="switchTab('${game.id}', 'class')" id="tab-class-${game.id}" class="tab-btn">Classificação</button>
                                        <button onclick="switchTab('${game.id}', 'h2h')" id="tab-h2h-${game.id}" class="tab-btn">H2H / Forma</button>
                                        <button onclick="switchTab('${game.id}', 'top')" id="tab-top-${game.id}" class="tab-btn">Destaques</button>
                                    </div>

                                    <div class="p-8">
                                        <div id="content-resumo-${game.id}" class="tab-content-${game.id} grid grid-cols-1 md:grid-cols-3 gap-8 animate-in">
                                            <div class="space-y-4">
                                                <h4 class="text-[10px] text-gray-500 font-black uppercase">Momento</h4>
                                                <div class="flex items-center gap-4">
                                                    <div class="flex gap-1" id="form-home-${game.id}">
                                                        <span class="text-xs text-gray-600 italic">Buscando...</span>
                                                    </div>
                                                    <div class="w-px h-6 bg-white/10"></div>
                                                    <div class="flex gap-1" id="form-away-${game.id}">
                                                        <span class="text-xs text-gray-600 italic">Buscando...</span>
                                                    </div>
                                                </div>
                                            </div>
                                            <div class="space-y-4">
                                                <h4 class="text-[10px] text-gray-500 font-black uppercase">Match Info</h4>
                                                <p class="text-xs text-white/70">Status: <span id="status-${game.id}" class="text-white font-bold">Verificando...</span></p>
                                                <p class="text-xs text-white/70">Local: <span id="venue-${game.id}" class="text-white font-bold">${game.venue}</span></p>
                                            </div>
                                            <div class="bg-trading-highlight/5 p-4 rounded-2xl border-l-4 border-trading-highlight">
                                                <h4 class="text-[10px] text-trading-highlight font-black uppercase mb-2">Monitoramento</h4>
                                                <p class="text-xs text-gray-400 italic" id="tip-${game.id}">Aguardando volume de jogo e gráficos de pressão.</p>
                                            </div>
                                        </div>

                                        <div id="content-class-${game.id}" class="tab-content-${game.id} hidden animate-in">
                                            <div class="bg-white/5 rounded-xl p-6 text-center border border-dashed border-white/10">
                                                <i class="fas fa-table text-gray-600 text-2xl mb-3"></i>
                                                <p class="text-xs text-gray-500 uppercase font-bold tracking-widest">Tabela em processamento...</p>
                                            </div>
                                        </div>

                                        <div id="content-h2h-${game.id}" class="tab-content-${game.id} hidden space-y-6 animate-in">
                                            <div class="grid grid-cols-3 gap-4 text-center">
                                                <div class="bg-white/5 p-4 rounded-xl"><p class="text-[10px] text-gray-500 uppercase">Vit. Casa</p><p id="h2h-home-${game.id}" class="text-xl font-black text-white">-</p></div>
                                                <div class="bg-white/5 p-4 rounded-xl"><p class="text-[10px] text-gray-500 uppercase">Empates</p><p id="h2h-draw-${game.id}" class="text-xl font-black text-white">-</p></div>
                                                <div class="bg-white/5 p-4 rounded-xl"><p class="text-[10px] text-gray-500 uppercase">Vit. Fora</p><p id="h2h-away-${game.id}" class="text-xl font-black text-white">-</p></div>
                                            </div>
                                            <div class="text-center"><p id="h2h-msg-${game.id}" class="text-[10px] text-gray-500 uppercase italic">Buscando histórico...</p></div>
                                        </div>

                                        <div id="content-top-${game.id}" class="tab-content-${game.id} hidden animate-in text-center py-6">
                                            <i class="fas fa-star text-trading-highlight mb-3 text-xl"></i>
                                            <p class="text-[10px] text-gray-500 uppercase font-black tracking-widest italic">Aguardando escalação e destaques.</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        `;
                    });
                    html += `</div></div>`;
                    list.innerHTML += html;
                }
            });
            document.getElementById('game-count').innerText = totalCount;
        }

        // GERENCIAMENTO DE ESTADO SÊNIOR (Apenas esconde/mostra, sem destruir HTML)
        function switchTab(id, aba) {
            const container = document.getElementById(`details-${id}`);
            
            // Esconde todos os conteúdos desta partida e reseta botões
            container.querySelectorAll(`.tab-content-${id}`).forEach(c => c.classList.add('hidden'));
            container.querySelectorAll(`.tab-btn`).forEach(b => b.classList.remove('active'));
            
            // Mostra a aba clicada
            document.getElementById(`content-${aba}-${id}`).classList.remove('hidden');
            document.getElementById(`tab-${aba}-${id}`).classList.add('active');
        }

        async function toggleDetails(id) { 
            const el = document.getElementById(`details-${id}`);
            const isOpening = el.classList.contains('hidden');
            
            el.classList.toggle('hidden');
            
            if (isOpening) {
                switchTab(id, 'resumo');
                buscarDetalhesSeguros(id); // Chama a API sem quebrar a tela
            }
        }

        function toggleFav(id) {
            id = String(id);
            if (favorites.includes(id)) {
                favorites = favorites.filter(f => f !== id);
            } else {
                favorites.push(id);
            }
            localStorage.setItem('futTraderFavs', JSON.stringify(favorites));
            renderAgenda();
        }

        // BUSCA DE DADOS COM INJEÇÃO SEGURA (Não usa innerHTML em blocos grandes)
        async function buscarDetalhesSeguros(id) {
            try {
                // Rotação Segura: Bypass direto via ESPN para evitar gargalo do Render
                const resp = await fetch(`https://site.api.espn.com/apis/site/v2/sports/soccer/summary?event=${id}`);
                if (!resp.ok) throw new Error("API Indisponível");
                const data = await resp.json();

                // Injetando textos via ID sem quebrar a UI
                document.getElementById(`status-${id}`).innerText = data.header?.competitions[0]?.status?.type?.detail || 'Ao Vivo';
                
                // Se o dado não existir, a UI se mantém com o valor "N/A" ou "-"
                document.getElementById(`h2h-msg-${id}`).innerText = "Dados históricos protegidos. Acesse a área PRO.";

                // Como a API da ESPN gratuita não manda a "Forma" em array, colocamos um visualizador estático de carregamento para não ficar vazio
                document.getElementById(`form-home-${id}`).innerHTML = `<div class="form-dot bg-gray-700 opacity-50">?</div><div class="form-dot bg-gray-700 opacity-50">?</div>`;
                document.getElementById(`form-away-${id}`).innerHTML = `<div class="form-dot bg-gray-700 opacity-50">?</div><div class="form-dot bg-gray-700 opacity-50">?</div>`;

            } catch (e) {
                console.warn("Falha silenciosa ao buscar detalhes do jogo:", id);
                document.getElementById(`status-${id}`).innerText = 'Falha de Conexão';
                document.getElementById(`tip-${id}`).innerText = 'Impossível carregar análise. Verifique o motor.';
            }
        }

        conectarAoMotor();
    </script>
</body>
</html>
