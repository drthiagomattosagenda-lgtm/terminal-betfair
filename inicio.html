<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QG Fut Trader - Central de Inteligência</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        trading: {
                            dark: '#0B0E14',
                            panel: '#151A22',
                            border: '#2A3241',
                            highlight: '#FFB100',
                            win: '#10B981',
                            loss: '#EF4444',
                            draw: '#718096',
                            rating: '#20C997'
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body { background-color: #0B0E14; color: #E2E8F0; font-family: 'Inter', sans-serif; }
        .navbar { display: flex !important; }
        
        /* Abas Estilo SofaScore */
        .tab-btn { position: relative; transition: 0.2s; color: #718096; white-space: nowrap; }
        .tab-btn.active { color: #FFB100; }
        .tab-btn.active::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 2px; background: #FFB100; }
        
        .game-card { border-left: 4px solid transparent; transition: 0.3s; }
        .game-card:hover { border-left-color: #FFB100; background: #1a222d; }
        
        .form-dot { width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: bold; color: white; }
        
        .league-header { background: linear-gradient(90deg, #151A22 0%, #0B0E14 100%); border-left: 4px solid #2A3241; }
        
        /* Animação suave para expandir */
        .details-content { transition: max-height 0.3s ease-out; }
    </style>
</head>
<body class="antialiased">

    <nav class="navbar">
        <div class="logo"><span>FUT</span> TRADER</div>
        <ul class="nav-links">
            <li><a href="inicio.html">Início</a></li>
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="aovivo.html">Ao Vivo</a></li>
            <li><a href="comunidade.html">Comunidade</a></li>
            <li><a href="index.html" class="text-red-500">Sair</a></li>
        </ul>
    </nav>

    <main class="max-w-6xl mx-auto p-4 md:p-8">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-black text-white tracking-tight uppercase">Agenda <span class="text-trading-highlight">Global</span></h1>
                <p class="text-gray-500 text-sm">Monitorando <span id="game-count">0</span> partidas ao redor do mundo.</p>
            </div>
            <div class="relative">
                <input type="text" id="agendaSearch" oninput="renderAgenda()" placeholder="🔎 Time, Liga ou Jogador..." 
                class="bg-trading-panel border border-trading-border rounded-xl py-2 px-10 text-xs focus:outline-none focus:border-trading-highlight text-white w-64 shadow-lg">
            </div>
        </div>

        <div id="agenda-list" class="space-y-6">
            </div>
    </main>

    <script>
        // BANCO DE DADOS: Suporta múltiplos tipos de torneios
        const gamesData = [
            {
                league: "Champions League - Playoffs",
                country: "Europa",
                games: [
                    {
                        id: 701, time: "16:00", home: "Real Madrid", away: "Manchester City", stadium: "Santiago Bernabéu", referee: "François Letexier",
                        isCup: true, leg: "Quartas de Final - Volta", aggregate: "3 - 3",
                        odds: { home: 2.80, draw: 3.50, away: 2.45 },
                        form: { home: ['V','V','V','E','V'], away: ['V','V','E','V','V'] },
                        h2h: { homeWins: 4, draws: 4, awayWins: 4 },
                        streaks: [
                            { team: "Real Madrid", text: "14 partidas sem perder", type: "pos" },
                            { team: "Man City", text: "10 partidas sem perder", type: "pos" },
                            { team: "Confronto", text: "Mais de 2.5 gols em 4/5 jogos", type: "pos" }
                        ],
                        tip: "Duelo de gigantes. O Real em casa na Champions é implacável, mas o City tem o controle. Chance alta de Ambas Marcam."
                    }
                ]
            },
            {
                league: "La Liga",
                country: "Espanha",
                games: [
                    {
                        id: 501, time: "16:00", home: "Cádiz", away: "Real Valladolid", stadium: "Nuevo Mirandilla", referee: "Isidro Díaz",
                        isCup: false,
                        odds: { home: 2.15, draw: 3.20, away: 3.60 },
                        form: { home: ['D','V','D','E','V'], away: ['V','D','V','D','D'] },
                        h2h: { homeWins: 4, draws: 5, awayWins: 3 },
                        table: [ {p: 14, t: "Valladolid", pts: 35}, {p: 16, t: "Cádiz", pts: 35} ],
                        streaks: [
                            { team: "Confronto", text: "Menos de 2.5 gols em 5/7 jogos", type: "pos" }
                        ],
                        tip: "Jogo tenso de rebaixamento. O Cádiz deve amarrar o jogo."
                    }
                ]
            }
        ];

        let favorites = JSON.parse(localStorage.getItem('futTraderFavs')) || [];

        function renderAgenda() {
            const list = document.getElementById('agenda-list');
            const search = document.getElementById('agendaSearch').value.toUpperCase();
            let count = 0;
            list.innerHTML = '';

            gamesData.forEach(group => {
                const filteredGames = group.games.filter(g => 
                    g.home.toUpperCase().includes(search) || 
                    g.away.toUpperCase().includes(search) || 
                    group.league.toUpperCase().includes(search)
                );

                if (filteredGames.length > 0) {
                    let groupHtml = `
                        <div class="league-group">
                            <div class="league-header px-4 py-2 flex items-center gap-3 rounded-t-xl border-b border-trading-border">
                                <span class="text-[10px] font-black text-gray-500 uppercase tracking-widest">${group.country} : ${group.league}</span>
                            </div>
                            <div class="bg-trading-panel divide-y divide-trading-border/30 rounded-b-xl overflow-hidden shadow-xl border-x border-b border-trading-border">
                    `;

                    filteredGames.forEach(game => {
                        count++;
                        const isFav = favorites.includes(game.id);
                        groupHtml += `
                            <div class="game-item">
                                <div class="game-card p-4 flex items-center justify-between cursor-pointer" onclick="toggleDetails(${game.id})">
                                    <div class="flex items-center gap-6">
                                        <div class="text-center min-w-[45px]">
                                            <p class="text-trading-highlight font-mono font-bold">${game.time}</p>
                                        </div>
                                        <div>
                                            <div class="flex items-center gap-2">
                                                <h3 class="text-sm md:text-base font-bold text-white">${game.home} x ${game.away}</h3>
                                                ${game.isCup ? `<span class="bg-red-900/50 text-red-400 text-[9px] px-1.5 py-0.5 rounded uppercase font-bold">Mata-Mata</span>` : ''}
                                            </div>
                                            <p class="text-[10px] text-gray-500 font-medium">${game.stadium} | <span class="text-gray-400">${game.referee}</span></p>
                                        </div>
                                    </div>
                                    <div class="flex items-center gap-4">
                                        <div class="hidden sm:flex gap-2 text-[10px] font-mono text-gray-400">
                                            <span class="bg-black/40 px-2 py-1 rounded">${game.odds.home}</span>
                                            <span class="bg-black/40 px-2 py-1 rounded">${game.odds.away}</span>
                                        </div>
                                        <i onclick="event.stopPropagation(); toggleFav(${game.id})" class="fa-star ${isFav ? 'fas text-yellow-500' : 'far text-gray-600'} text-lg transition hover:scale-125"></i>
                                    </div>
                                </div>

                                <div id="details-${game.id}" class="hidden bg-trading-dark border-t border-trading-border">
                                    <div class="flex border-b border-trading-border overflow-x-auto no-scrollbar">
                                        <button onclick="switchTab(${game.id}, 'resumo')" id="tab-resumo-${game.id}" class="tab-btn active px-6 py-3 text-[10px] font-black uppercase tracking-tighter">Resumo</button>
                                        <button onclick="switchTab(${game.id}, 'info')" id="tab-info-${game.id}" class="tab-btn px-6 py-3 text-[10px] font-black uppercase tracking-tighter">Info</button>
                                        <button onclick="switchTab(${game.id}, 'h2h')" id="tab-h2h-${game.id}" class="tab-btn px-6 py-3 text-[10px] font-black uppercase tracking-tighter">Confrontos</button>
                                    </div>

                                    <div class="p-5">
                                        <div id="content-resumo-${game.id}" class="tab-content-${game.id} space-y-6">
                                            ${game.isCup ? `
                                            <div class="bg-red-900/10 border border-red-900/30 p-3 rounded-lg flex justify-between items-center">
                                                <span class="text-[10px] font-bold text-red-400 uppercase tracking-widest"><i class="fas fa-trophy mr-2"></i> Placar Agregado</span>
                                                <span class="text-white font-black">${game.aggregate}</span>
                                            </div>` : ''}

                                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                                <div class="space-y-4">
                                                    <h4 class="text-[9px] text-gray-600 font-black uppercase">Forma Recente</h4>
                                                    <div class="flex gap-8">
                                                        <div class="flex gap-1">${game.form.home.map(r => `<div class="form-dot bg-${r=='V'?'trading-win':r=='D'?'trading-loss':'trading-draw'}">${r}</div>`).join('')}</div>
                                                        <div class="flex gap-1">${game.form.away.map(r => `<div class="form-dot bg-${r=='V'?'trading-win':r=='D'?'trading-loss':'trading-draw'}">${r}</div>`).join('')}</div>
                                                    </div>
                                                </div>
                                                <div class="bg-trading-panel p-3 rounded-lg border-l-2 border-trading-highlight">
                                                    <h4 class="text-[9px] text-trading-highlight font-black uppercase mb-1">Dica Pro</h4>
                                                    <p class="text-[11px] text-gray-400 italic leading-relaxed">"${game.tip}"</p>
                                                </div>
                                            </div>
                                        </div>

                                        <div id="content-info-${game.id}" class="tab-content-${game.id} hidden">
                                            ${!game.isCup ? `
                                            <table class="w-full text-[11px]">
                                                <tr class="text-gray-500 border-b border-trading-border"><th class="pb-2 text-left">#</th><th class="pb-2 text-left">TIME</th><th class="pb-2 text-right">PTS</th></tr>
                                                ${game.table.map(t => `<tr class="border-b border-trading-border/20"><td class="py-2">${t.p}</td><td class="font-bold text-white">${t.t}</td><td class="text-right text-trading-highlight font-black">${t.pts}</td></tr>`).join('')}
                                            </table>
                                            ` : `
                                            <div class="text-center py-4">
                                                <p class="text-[10px] text-gray-500 font-bold uppercase mb-2">Chaveamento do Torneio</p>
                                                <div class="flex justify-center items-center gap-4 text-xs font-bold">
                                                    <span class="text-white">Quartas</span> <i class="fas fa-long-arrow-alt-right text-gray-700"></i> <span class="text-gray-600">Semis</span>
                                                </div>
                                            </div>
                                            `}
                                        </div>

                                        <div id="content-h2h-${game.id}" class="tab-content-${game.id} hidden space-y-4">
                                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                ${game.streaks.map(s => `
                                                    <div class="bg-trading-panel/50 p-2 border border-trading-border rounded-md text-[11px]">
                                                        <span class="text-gray-600 font-black text-[9px] uppercase">${s.team}</span>
                                                        <p class="text-white font-semibold">${s.text}</p>
                                                    </div>
                                                `).join('')}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        `;
                    });
                    groupHtml += `</div></div>`;
                    list.innerHTML += groupHtml;
                }
            });
            document.getElementById('game-count').innerText = count;
        }

        function toggleDetails(id) { document.getElementById(`details-${id}`).classList.toggle('hidden'); }
        
        function switchTab(gameId, tab) {
            document.querySelectorAll(`.tab-content-${gameId}`).forEach(c => c.classList.add('hidden'));
            document.querySelectorAll(`#details-${gameId} .tab-btn`).forEach(b => b.classList.remove('active'));
            document.getElementById(`content-${tab}-${gameId}`).classList.remove('hidden');
            document.getElementById(`tab-${tab}-${gameId}`).classList.add('active');
            event.stopPropagation();
        }

        function toggleFav(id) {
            favorites.includes(id) ? favorites = favorites.filter(f => f !== id) : favorites.push(id);
            localStorage.setItem('futTraderFavs', JSON.stringify(favorites));
            renderAgenda();
        }

        renderAgenda();
    </script>
</body>
</html>
