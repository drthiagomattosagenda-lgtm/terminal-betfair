<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QG Fut Trader - Central de Inteligência</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        trading: {
                            dark: '#0B0E14',
                            panel: '#151A22',
                            border: '#2A3241',
                            highlight: '#FFB100',
                            win: '#10B981',
                            loss: '#EF4444',
                            draw: '#718096'
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body { background-color: #0B0E14; color: #E2E8F0; font-family: 'Inter', sans-serif; }
        .nav-links { display: flex; gap: 20px; list-style: none; }
        .nav-links a { color: #718096; font-size: 14px; font-weight: 600; text-decoration: none; transition: 0.3s; }
        .nav-links a:hover { color: #FFB100; }
        
        .tab-btn { color: #718096; font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; transition: 0.2s; position: relative; padding-bottom: 12px; }
        .tab-btn.active { color: #FFB100; }
        .tab-btn.active::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 2px; background: #FFB100; }
        
        .form-dot { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; color: white; text-shadow: 0px 1px 2px rgba(0,0,0,0.5); }
        .animate-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="antialiased">

    <nav class="border-b border-trading-border p-4 mb-8">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="text-xl font-black italic tracking-tighter text-white">FUT <span class="text-trading-highlight">TRADER</span></div>
            <ul class="nav-links">
                <li><a href="inicio.html" class="text-trading-highlight">Início</a></li>
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="aovivo.html">Ao Vivo</a></li>
                <li><a href="index.html" class="text-red-500">Sair</a></li>
            </ul>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-4">
        <div class="flex flex-col md:flex-row justify-between items-end mb-10 gap-6">
            <div>
                <h1 class="text-4xl font-black text-white tracking-tighter uppercase italic leading-none">QUARTEL <span class="text-trading-highlight">GENERAL</span></h1>
                <p class="text-gray-500 text-xs mt-2 font-medium tracking-wide">Monitorando <span id="game-count" class="text-white">0</span> eventos em tempo real.</p>
            </div>
            <div class="w-full md:w-auto">
                <input type="text" id="agendaSearch" oninput="renderAgenda()" placeholder="🔎 Filtrar time ou liga..." 
                class="w-full md:w-80 bg-trading-panel border border-trading-border rounded-xl py-3 px-6 text-xs focus:outline-none focus:border-trading-highlight text-white shadow-2xl transition-all">
            </div>
        </div>

        <div id="loading-alert" class="text-center py-20">
            <i id="loading-icon" class="fas fa-circle-notch fa-spin text-trading-highlight text-3xl"></i>
            <p id="loading-text" class="text-gray-500 mt-4 font-bold uppercase text-[10px] tracking-[3px]">Sincronizando Grade Global...</p>
        </div>

        <div id="agenda-list" class="space-y-10"></div>
    </main>

    <script>
        let gamesData = [];
        let favorites = JSON.parse(localStorage.getItem('futTraderFavs')) || [];

        function tratarStatus(status) {
            if (!status) return "--:--";
            const s = status.toUpperCase();
            if (s.includes("SCHEDULED")) return "Em Breve";
            if (s.includes("CANCELED") || s.includes("CANCELLED")) return "Cancelado";
            if (s.includes("POSTPONED")) return "Adiado";
            if (s.includes("FT-PENS") || s.includes("PEN")) return "FT-Penal";
            const finalizacoes = ["FT", "FINAL", "ENDED", "FIM", "FULL TIME"];
            if (finalizacoes.some(f => s === f || s.includes(f))) return "FIM";
            return status.replace(/AM|PM/gi, "").trim();
        }

        async function conectarAoMotor() {
            const alertBox = document.getElementById('loading-alert');
            const alertText = document.getElementById('loading-text');
            const alertIcon = document.getElementById('loading-icon');

            try {
                const response = await fetch('https://motor-ferrari.onrender.com/jogos');
                if (!response.ok) throw new Error("Falha HTTP");
                
                const result = await response.json();
                if (!result.sucesso) throw new Error("Erro da API: " + result.erro);

                if (result.dados && result.dados.length > 0) {
                    const grouped = result.dados.reduce((acc, game) => {
                        const key = game.league || "Outras Competições";
                        if (!acc[key]) acc[key] = { name: key, games: [] };
                        acc[key].games.push(game);
                        return acc;
                    }, {});

                    gamesData = Object.values(grouped);
                    alertBox.classList.add('hidden');
                    renderAgenda();
                } else {
                    alertIcon.className = "fas fa-calendar-times text-gray-600 text-3xl";
                    alertText.innerText = "Nenhum evento detectado para hoje.";
                }
            } catch (error) {
                console.warn("Motor em inicialização...");
                alertIcon.className = "fas fa-sync fa-spin text-red-500 text-3xl";
                alertText.innerHTML = "Acordando Servidor (Isso leva uns 40s)...";
                setTimeout(conectarAoMotor, 5000); 
            }
        }

        function renderAgenda() {
            const list = document.getElementById('agenda-list');
            const search = document.getElementById('agendaSearch').value.toUpperCase();
            let totalCount = 0;
            list.innerHTML = '';

            gamesData.forEach(league => {
                const filteredGames = league.games.filter(g => 
                    (g.home && g.home.toUpperCase().includes(search)) || 
                    (g.away && g.away.toUpperCase().includes(search))
                );

                if (filteredGames.length > 0) {
                    let html = `
                        <div class="league-section animate-in">
                            <div class="flex items-center gap-3 mb-3 px-2">
                                <div class="w-1 h-4 bg-trading-highlight rounded-full"></div>
                                <span class="text-[11px] font-black text-white uppercase tracking-[2px]">${league.name}</span>
                            </div>
                            <div class="bg-trading-panel rounded-2xl border border-trading-border overflow-hidden divide-y divide-white/5 shadow-2xl">
                    `;

                    filteredGames.forEach(game => {
                        totalCount++;
                        const isFav = favorites.includes(String(game.id));
                        const statusFormatado = tratarStatus(game.time);
                        const statusColor = ['FIM', 'Cancelado', 'Adiado', 'FT-Penal'].includes(statusFormatado) ? 'text-red-500' : 'text-trading-highlight';
                        
                        html += `
                            <div class="game-item">
                                <div class="p-5 flex items-center justify-between cursor-pointer hover:bg-white/[0.02] transition" onclick="toggleDetails('${game.id}')">
                                    <div class="flex items-center gap-8">
                                        <div class="text-center min-w-[60px]">
                                            <p class="${statusColor} font-mono font-black text-sm uppercase">${statusFormatado}</p>
                                        </div>
                                        <div class="flex flex-col">
                                            <div class="flex items-center gap-4">
                                                <span class="text-base font-black text-white uppercase tracking-tight">${game.home || 'Time Casa'}</span>
                                                <span class="text-[10px] text-gray-700 font-black italic">VS</span>
                                                <span class="text-base font-black text-white uppercase tracking-tight">${game.away || 'Time Fora'}</span>
                                            </div>
                                            <span class="text-[9px] text-gray-500 uppercase mt-1 tracking-wider"><i class="fas fa-map-marker-alt mr-1"></i>${game.venue || 'Local não informado'}</span>
                                        </div>
                                    </div>
                                    <div class="flex items-center gap-6">
                                        <div class="bg-black/40 px-4 py-2 rounded-xl border border-white/5 text-sm font-mono font-black text-white">${game.score || '0-0'}</div>
                                        <i onclick="event.stopPropagation(); toggleFav('${game.id}')" class="fa-star ${isFav ? 'fas text-trading-highlight' : 'far text-gray-700'} text-xl transition hover:scale-125"></i>
                                    </div>
                                </div>

                                <div id="details-${game.id}" class="hidden bg-[#0D1117] border-t border-white/5">
                                    <div class="flex gap-8 px-8 border-b border-white/5 overflow-x-auto no-scrollbar pt-4">
                                        <button onclick="switchTab('${game.id}', 'resumo')" id="tab-resumo-${game.id}" class="tab-btn active">RESUMO</button>
                                        <button onclick="switchTab('${game.id}', 'class')" id="tab-class-${game.id}" class="tab-btn">CLASSIFICAÇÃO</button>
                                        <button onclick="switchTab('${game.id}', 'h2h')" id="tab-h2h-${game.id}" class="tab-btn">H2H DETALHADO</button>
                                        <button onclick="switchTab('${game.id}', 'top')" id="tab-top-${game.id}" class="tab-btn">DESTAQUES</button>
                                    </div>

                                    <div class="p-8 relative">
                                        <div id="loader-detalhe-${game.id}" class="absolute inset-0 bg-[#0D1117]/90 flex items-center justify-center z-10 hidden">
                                            <i class="fas fa-circle-notch fa-spin text-trading-highlight text-2xl"></i>
                                        </div>

                                        <div id="content-resumo-${game.id}" class="tab-content-${game.id} grid grid-cols-1 md:grid-cols-3 gap-8 animate-in">
                                            <div class="space-y-4">
                                                <h4 class="text-[10px] text-gray-500 font-black uppercase">Momento Recente</h4>
                                                <div class="flex items-center gap-4">
                                                    <div class="flex gap-1" id="form-home-${game.id}"><span class="text-xs text-gray-600 italic">...</span></div>
                                                    <div class="w-px h-6 bg-white/10"></div>
                                                    <div class="flex gap-1" id="form-away-${game.id}"><span class="text-xs text-gray-600 italic">...</span></div>
                                                </div>
                                            </div>
                                            <div class="space-y-4">
                                                <h4 class="text-[10px] text-gray-500 font-black uppercase">Infos</h4>
                                                <p class="text-xs text-white/70">Status: <span id="status-${game.id}" class="text-white font-bold">...</span></p>
                                                <p class="text-xs text-white/70">Local: <span class="text-white font-bold">${game.venue || 'N/A'}</span></p>
                                            </div>
                                            <div class="bg-trading-highlight/5 p-4 rounded-2xl border-l-4 border-trading-highlight">
                                                <h4 class="text-[10px] text-trading-highlight font-black uppercase mb-2">Análise Elo Rating</h4>
                                                <p class="text-xs text-gray-400 italic" id="tip-${game.id}">Processando...</p>
                                            </div>
                                        </div>

                                        <div id="content-class-${game.id}" class="tab-content-${game.id} hidden animate-in">
                                            <div id="tabela-container-${game.id}" class="grid grid-cols-2 gap-8 text-center bg-white/5 rounded-xl p-6 border border-white/10 hidden">
                                                <div>
                                                    <p class="text-[10px] text-trading-highlight uppercase font-bold tracking-widest">${game.home}</p>
                                                    <p class="text-xs text-white mt-2">Posição: <span id="pos-home-${game.id}" class="font-black text-lg">-</span></p>
                                                    <p class="text-xs text-gray-400">Pontos: <span id="pts-home-${game.id}" class="font-bold">-</span></p>
                                                </div>
                                                <div class="border-l border-white/10">
                                                    <p class="text-[10px] text-trading-highlight uppercase font-bold tracking-widest">${game.away}</p>
                                                    <p class="text-xs text-white mt-2">Posição: <span id="pos-away-${game.id}" class="font-black text-lg">-</span></p>
                                                    <p class="text-xs text-gray-400">Pontos: <span id="pts-away-${game.id}" class="font-bold">-</span></p>
                                                </div>
                                            </div>
                                            <p id="tabela-aviso-${game.id}" class="text-center text-[10px] text-gray-500 mt-3 uppercase font-bold">Aguardando dados da tabela...</p>
                                        </div>

                                        <div id="content-h2h-${game.id}" class="tab-content-${game.id} hidden animate-in">
                                            <div id="h2h-container-${game.id}" class="grid grid-cols-1 md:grid-cols-2 gap-8 hidden">
                                                <div>
                                                    <p class="text-[10px] text-white uppercase font-black tracking-widest mb-3 border-b border-white/10 pb-2">${game.home}</p>
                                                    <div id="h2h-list-home-${game.id}" class="space-y-2"></div>
                                                </div>
                                                <div>
                                                    <p class="text-[10px] text-white uppercase font-black tracking-widest mb-3 border-b border-white/10 pb-2">${game.away}</p>
                                                    <div id="h2h-list-away-${game.id}" class="space-y-2"></div>
                                                </div>
                                            </div>
                                            <p id="h2h-aviso-${game.id}" class="text-center text-[10px] text-gray-500 mt-3 uppercase font-bold">Aguardando histórico de confrontos...</p>
                                        </div>

                                        <div id="content-top-${game.id}" class="tab-content-${game.id} hidden animate-in">
                                             <div id="stats-container-${game.id}" class="grid grid-cols-3 gap-4 text-center items-center bg-white/5 p-6 rounded-xl border border-white/10 hidden">
                                                <div><p id="stats-home-pos-${game.id}" class="text-2xl font-black text-white">-</p></div>
                                                <div><p class="text-[10px] text-gray-500 uppercase font-black tracking-widest">Posse de Bola</p></div>
                                                <div><p id="stats-away-pos-${game.id}" class="text-2xl font-black text-white">-</p></div>

                                                <div><p id="stats-home-shots-${game.id}" class="text-xl font-bold text-gray-300">-</p></div>
                                                <div><p class="text-[10px] text-gray-500 uppercase font-black tracking-widest mt-4">Chutes Totais</p></div>
                                                <div><p id="stats-away-shots-${game.id}" class="text-xl font-bold text-gray-300">-</p></div>
                                            </div>
                                            <p id="stats-aviso-${game.id}" class="text-center text-[10px] text-gray-500 mt-3 uppercase font-bold">Aguardando estatísticas do jogo...</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        `;
                    });
                    html += `</div></div>`;
                    list.innerHTML += html;
                }
            });
            document.getElementById('game-count').innerText = totalCount;
        }

        function switchTab(id, aba) {
            const container = document.getElementById(`details-${id}`);
            if(!container) return; 
            container.querySelectorAll(`.tab-content-${id}`).forEach(c => c.classList.add('hidden'));
            container.querySelectorAll(`.tab-btn`).forEach(b => b.classList.remove('active'));
            document.getElementById(`content-${aba}-${id}`).classList.remove('hidden');
            document.getElementById(`tab-${aba}-${id}`).classList.add('active');
        }

        async function toggleDetails(id) { 
            const el = document.getElementById(`details-${id}`);
            if(!el) return;
            const isOpening = el.classList.contains('hidden');
            el.classList.toggle('hidden');
            
            if (isOpening) {
                switchTab(id, 'resumo');
                if (document.getElementById(`form-home-${id}`).innerHTML.includes('...')) {
                    buscarDetalhesSeguros(id);
                }
            }
        }

        function toggleFav(id) {
            id = String(id);
            if (favorites.includes(id)) {
                favorites = favorites.filter(f => f !== id);
            } else {
                favorites.push(id);
            }
            localStorage.setItem('futTraderFavs', JSON.stringify(favorites));
            renderAgenda();
        }

        // 🛡️ A INJEÇÃO BLINDADA COM CORREÇÃO DO TAILWIND CSS
        async function buscarDetalhesSeguros(id) {
            const loader = document.getElementById(`loader-detalhe-${id}`);
            if(loader) loader.classList.remove('hidden');

            try {
                const resp = await fetch(`https://motor-ferrari.onrender.com/detalhes/${id}`);
                const result = await resp.json();

                if (!result.sucesso) throw new Error("Sem dados na API.");

                // STATUS E GERAL
                document.getElementById(`status-${id}`).innerText = tratarStatus(result.status || 'Ao Vivo');

                // CORREÇÃO CRÍTICA DO TAILWIND CSS (Cores explícitas)
                const buildForm = (arr) => {
                    if (!arr || arr.length === 0 || arr[0] === '?') return `<span class="text-xs text-gray-600 italic">Indisponível</span>`;
                    return arr.map(r => {
                        let corClass = 'bg-trading-draw';
                        if (r === 'V') corClass = 'bg-trading-win';
                        if (r === 'D') corClass = 'bg-trading-loss';
                        return `<div class="form-dot ${corClass}">${r}</div>`;
                    }).join('');
                };

                document.getElementById(`form-home-${id}`).innerHTML = buildForm(result.forma?.home);
                document.getElementById(`form-away-${id}`).innerHTML = buildForm(result.forma?.away);

                // ELO RATING
                const eloHome = result.soccerdata?.home_elo;
                const eloAway = result.soccerdata?.away_elo;
                if (eloHome && eloHome !== 'N/A' && eloAway !== 'N/A') {
                    document.getElementById(`tip-${id}`).innerHTML = `<b class="text-white">ClubElo:</b> Casa (${eloHome}) vs Fora (${eloAway})`;
                } else {
                    document.getElementById(`tip-${id}`).innerText = `Sem base matemática para este duelo.`;
                }

                // TABELA CLASSIFICAÇÃO
                if (result.tabela && result.tabela.pos_home && result.tabela.pos_home !== "-") {
                    document.getElementById(`pos-home-${id}`).innerText = result.tabela.pos_home + "º";
                    document.getElementById(`pos-away-${id}`).innerText = result.tabela.pos_away + "º";
                    document.getElementById(`pts-home-${id}`).innerText = result.tabela.pts_home;
                    document.getElementById(`pts-away-${id}`).innerText = result.tabela.pts_away;
                    document.getElementById(`tabela-container-${id}`).classList.remove('hidden');
                    document.getElementById(`tabela-aviso-${id}`).classList.add('hidden');
                } else {
                    document.getElementById(`tabela-aviso-${id}`).innerText = "Classificação não disponível para esta liga ou amistoso.";
                }

                // ROBÔ H2H NA TELA (CORREÇÃO DE TEXTO LONGO)
                const buildH2HList = (historico) => {
                    if (!historico || historico.length === 0) return '';
                    return historico.map(h => {
                        let textCor = 'text-trading-draw';
                        if (h.resultado === 'V') textCor = 'text-trading-win';
                        if (h.resultado === 'D') textCor = 'text-trading-loss';
                        const jogoLimpo = h.jogo.replace(/"/g, '&quot;'); // Evita quebrar o HTML
                        
                        return `
                            <div class="flex justify-between items-center bg-white/5 p-2 rounded border border-white/5 text-xs">
                                <span class="text-gray-400 max-w-[120px] truncate" title="${jogoLimpo}">${jogoLimpo}</span>
                                <div class="flex items-center gap-3">
                                    <span class="font-mono text-white font-bold">${h.placar}</span>
                                    <span class="font-black ${textCor}">${h.resultado}</span>
                                </div>
                            </div>
                        `;
                    }).join('');
                };

                if (result.historico && (result.historico.home.length > 0 || result.historico.away.length > 0)) {
                    document.getElementById(`h2h-list-home-${id}`).innerHTML = buildH2HList(result.historico.home);
                    document.getElementById(`h2h-list-away-${id}`).innerHTML = buildH2HList(result.historico.away);
                    document.getElementById(`h2h-container-${id}`).classList.remove('hidden');
                    document.getElementById(`h2h-aviso-${id}`).classList.add('hidden');
                } else {
                    document.getElementById(`h2h-aviso-${id}`).innerText = "Histórico detalhado indisponível para esta partida.";
                }

                // ESTATÍSTICAS
                if (result.estatisticas && result.estatisticas.home_possession && result.estatisticas.home_possession !== "-") {
                    document.getElementById(`stats-home-pos-${id}`).innerText = result.estatisticas.home_possession + "%";
                    document.getElementById(`stats-away-pos-${id}`).innerText = result.estatisticas.away_possession + "%";
                    document.getElementById(`stats-home-shots-${id}`).innerText = result.estatisticas.home_shots;
                    document.getElementById(`stats-away-shots-${id}`).innerText = result.estatisticas.away_shots;
                    document.getElementById(`stats-container-${id}`).classList.remove('hidden');
                    document.getElementById(`stats-aviso-${id}`).classList.add('hidden');
                } else {
                    document.getElementById(`stats-aviso-${id}`).innerText = "Estatísticas do jogo indisponíveis no momento.";
                }

            } catch (e) {
                document.getElementById(`status-${id}`).innerText = 'Info. Limitada';
                document.getElementById(`form-home-${id}`).innerHTML = `<span class="text-xs text-gray-600 italic">N/A</span>`;
                document.getElementById(`form-away-${id}`).innerHTML = `<span class="text-xs text-gray-600 italic">N/A</span>`;
                document.getElementById(`tip-${id}`).innerText = `Jogo com escassez de dados globais.`;
                document.getElementById(`tabela-aviso-${id}`).innerText = "Dados Indisponíveis.";
                document.getElementById(`h2h-aviso-${id}`).innerText = "Dados Indisponíveis.";
                document.getElementById(`stats-aviso-${id}`).innerText = "Dados Indisponíveis.";
            } finally {
                if(loader) loader.classList.add('hidden');
            }
        }

        conectarAoMotor();
    </script>
</body>
</html>
