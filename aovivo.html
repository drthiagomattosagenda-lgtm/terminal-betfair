<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal Live - Fut Trader Pro</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        trading: {
                            dark: '#0B0E14',
                            panel: '#151A22',
                            border: '#2A3241',
                            home: '#10B981', 
                            away: '#EF4444', 
                            highlight: '#FFB100',
                            pressure: '#7C3AED'
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body { background-color: #0B0E14; color: #E2E8F0; margin: 0; }
        
        /* CONTAINER DO GRÁFICO - 90 COLUNAS FIXAS */
        .chart-90-min {
            height: 140px;
            display: grid;
            grid-template-columns: repeat(90, 1fr);
            gap: 1px;
            background: rgba(0,0,0,0.6);
            padding: 0 5px;
            border-radius: 4px;
            position: relative;
            overflow: hidden;
            border: 1px solid #2A3241;
        }

        /* LINHA HORIZONTAL CENTRAL (PONTO ZERO) */
        .center-line {
            position: absolute; left: 0; right: 0; top: 50%; height: 1px;
            background: rgba(255,255,255,0.4); z-index: 5; pointer-events: none;
        }

        /* LINHAS DE ZONA (REFERÊNCIA DE SENSIBILIDADE) */
        .zone-line {
            position: absolute; left: 0; right: 0; height: 1px;
            border-top: 1px dashed rgba(255,255,255,0.08); z-index: 1; pointer-events: none;
        }
        /* Posicionamento das zonas Baixa (20) e Média (40) */
        .z-up-40 { top: 10%; } 
        .z-up-20 { top: 30%; } 
        .z-down-20 { top: 70%; }
        .z-down-40 { top: 90%; }

        .minute-slot { height: 100%; position: relative; z-index: 2; }

        /* BARRAS COM TRANSIÇÃO SUAVE */
        .bar-home {
            background-color: #10B981;
            width: 100%; position: absolute; bottom: 50%; left: 0;
            border-radius: 1px 1px 0 0; transition: height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .bar-away {
            background-color: #EF4444;
            width: 100%; position: absolute; top: 50%; left: 0;
            border-radius: 0 0 1px 1px; transition: height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* MARCADORES DE EVENTOS */
        .marker { position: absolute; left: 50%; transform: translateX(-50%); border-radius: 50%; z-index: 10; }
        .marker-alvo { width: 6px; height: 6px; background-color: #FFF; box-shadow: 0 0 5px #FFF; }
        .marker-lado { width: 3px; height: 3px; background-color: #FFB100; }
        .home-marker { bottom: 8px; } 
        .away-marker { top: 8px; }

        /* DESTAQUE ALTA PRESSÃO */
        .card-high-pressure {
            border: 2px solid #7C3AED !important;
            box-shadow: 0 0 25px rgba(124, 58, 237, 0.4);
            background: linear-gradient(to bottom, #151A22, #1a0b2e) !important;
        }

        .filter-btn.active { background-color: #FFB100 !important; color: black !important; border-color: #FFB100 !important; }
        .navbar { display: flex !important; }
    </style>
</head>
<body class="antialiased">

    <nav class="navbar">
        <div class="logo"><span>FUT</span> TRADER</div>
        <ul class="nav-links">
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="aovivo.html">Ao Vivo</a></li>
            <li><a href="comunidade.html">Comunidade</a></li>
            <li><a href="index.html" class="text-red-500">Sair</a></li>
        </ul>
    </nav>

    <div class="bg-trading-panel border-b border-trading-border p-3 sticky top-[70px] z-40">
        <div class="max-w-7xl mx-auto flex flex-wrap items-center justify-between gap-4">
            <div class="flex gap-2" id="filter-group">
                <button onclick="setFilter('todos')" class="filter-btn active bg-trading-dark px-4 py-1.5 rounded text-xs font-bold uppercase border border-trading-border transition">Todos</button>
                <button onclick="setFilter('favoritos')" class="filter-btn bg-trading-dark px-4 py-1.5 rounded text-xs font-bold uppercase border border-trading-border transition"><i class="fas fa-star text-yellow-500 mr-1"></i> Favoritos</button>
                <button onclick="setFilter('1t')" class="filter-btn bg-trading-dark px-4 py-1.5 rounded text-xs font-bold uppercase border border-trading-border transition">1º Tempo</button>
                <button onclick="setFilter('2t')" class="filter-btn bg-trading-dark px-4 py-1.5 rounded text-xs font-bold uppercase border border-trading-border transition">2º Tempo</button>
                <button onclick="setFilter('pressao')" class="filter-btn bg-trading-dark px-4 py-1.5 rounded text-xs font-bold uppercase border border-trading-border transition text-trading-pressure font-black">Alta Pressão</button>
            </div>
            <div class="relative">
                <input type="text" id="gameSearch" oninput="handleSearch(this.value)" placeholder="🔎 Buscar jogo..." class="bg-trading-dark border border-trading-border rounded-full py-1.5 px-10 text-xs focus:outline-none focus:border-trading-highlight w-64 text-white">
                <i class="fas fa-search absolute left-4 top-2.5 text-trading-text opacity-50"></i>
            </div>
        </div>
    </div>

    <main class="max-w-[1400px] mx-auto p-6">
        <div id="live-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>

        <div class="flex justify-center items-center gap-6 mt-12 mb-10">
            <button onclick="prevPage()" id="prevBtn" class="bg-trading-panel border border-trading-border px-6 py-2 rounded text-sm font-bold hover:bg-trading-dark disabled:opacity-30 transition">Anterior</button>
            <span class="text-xs font-mono text-trading-text">Página <strong id="pageDisplay" class="text-white">1</strong> de <span id="totalDisplay">1</span></span>
            <button onclick="nextPage()" id="nextBtn" class="bg-trading-panel border border-trading-border px-6 py-2 rounded text-sm font-bold hover:bg-trading-dark disabled:opacity-30 transition">Próxima</button>
        </div>
    </main>

    <script>
        // MOTOR DE DADOS (Simulação)
        const baseGames = [
            { id: 1, home: "PALMEIRAS", away: "FLAMENGO", score: "1 - 0", time: 43, possession: 55, shots6m: 4, shotsConc9m: 0 },
            { id: 2, home: "CORINTHIANS", away: "SANTOS", score: "0 - 0", time: 15, possession: 50, shots6m: 0, shotsConc9m: 0 },
            { id: 3, home: "SAO PAULO", away: "GREMIO", score: "2 - 1", time: 78, possession: 48, shots6m: 1, shotsConc9m: 2 },
            { id: 4, home: "REAL MADRID", away: "BARCELONA", score: "0 - 0", time: 30, possession: 52, shots6m: 5, shotsConc9m: 0 },
            { id: 5, home: "MAN CITY", away: "ARSENAL", score: "3 - 0", time: 88, possession: 65, shots6m: 2, shotsConc9m: 0 }
        ];
        
        let allGames = [];
        for(let i=0; i<50; i++) {
            let base = baseGames[i % baseGames.length];
            allGames.push({...base, id: i + 1, home: base.home + (i > 4 ? " " + (i+1) : "")});
        }

        // ESTADO GLOBAL
        let favorites = JSON.parse(localStorage.getItem('futTraderFavs')) || [];
        let currentFilter = 'todos';
        let searchQuery = '';
        let currentPage = 1;
        const gamesPerPage = 9;

        function setFilter(filter) {
            currentFilter = filter;
            currentPage = 1;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            if(event) event.currentTarget.classList.add('active');
            renderGrid();
        }

        function handleSearch(val) {
            searchQuery = val.toUpperCase();
            currentPage = 1;
            renderGrid();
        }

        function toggleFavorite(id) {
            if (favorites.includes(id)) {
                favorites = favorites.filter(favId => favId !== id);
            } else {
                favorites.push(id);
            }
            localStorage.setItem('futTraderFavs', JSON.stringify(favorites));
            renderGrid();
        }

        function isAltaPressao(game) {
            return game.shots6m >= 3 && game.possession > 51 && game.shotsConc9m === 0;
        }

        function renderGrid() {
            const grid = document.getElementById('live-grid');
            grid.innerHTML = '';

            let filtered = allGames.filter(game => {
                const matchesSearch = game.home.includes(searchQuery) || game.away.includes(searchQuery);
                let matchesCategory = true;
                if (currentFilter === 'favoritos') matchesCategory = favorites.includes(game.id);
                else if (currentFilter === '1t') matchesCategory = game.time <= 45;
                else if (currentFilter === '2t') matchesCategory = game.time > 45;
                else if (currentFilter === 'pressao') matchesCategory = isAltaPressao(game);
                return matchesSearch && matchesCategory;
            });

            filtered.sort((a, b) => (favorites.includes(b.id) ? 1 : 0) - (favorites.includes(a.id) ? 1 : 0));

            const totalPages = Math.ceil(filtered.length / gamesPerPage) || 1;
            if (currentPage > totalPages) currentPage = totalPages;
            
            const start = (currentPage - 1) * gamesPerPage;
            const paginated = filtered.slice(start, start + gamesPerPage);

            document.getElementById('pageDisplay').innerText = currentPage;
            document.getElementById('totalDisplay').innerText = totalPages;
            document.getElementById('prevBtn').disabled = currentPage === 1;
            document.getElementById('nextBtn').disabled = currentPage === totalPages;

            paginated.forEach((game) => {
                const highP = isAltaPressao(game);
                const isFav = favorites.includes(game.id);
                
                grid.innerHTML += `
                    <div class="bg-trading-panel border border-trading-border rounded-xl p-4 transition-all ${highP ? 'card-high-pressure' : ''}">
                        <div class="flex justify-between items-center mb-4">
                            <div class="text-sm font-bold flex items-center gap-2">
                                <span class="text-trading-highlight">${game.home}</span> 
                                <span class="bg-trading-dark px-2 rounded">${game.score}</span> 
                                <span>${game.away}</span>
                                <span class="text-[10px] text-trading-edge font-mono ml-2">${game.time}'</span>
                            </div>
                            <i onclick="toggleFavorite(${game.id})" class="${isFav ? 'fas fa-star text-yellow-500' : 'far fa-star'} text-sm cursor-pointer transition hover:scale-125"></i>
                        </div>

                        <div class="chart-90-min">
                            <div class="center-line"></div>
                            <div class="zone-line z-up-40"></div>
                            <div class="zone-line z-up-20"></div>
                            <div class="zone-line z-down-20"></div>
                            <div class="zone-line z-down-40"></div>
                            ${generate90Bars(game.time)}
                        </div>

                        <div class="mt-4">
                            <div class="flex justify-between text-[9px] font-bold mb-1 uppercase tracking-tighter">
                                <span>Posse: ${game.possession}%</span>
                                <span>${100 - game.possession}%</span>
                            </div>
                            <div class="h-1.5 w-full bg-gray-950 rounded-full flex overflow-hidden">
                                <div class="bg-trading-home" style="width: ${game.possession}%"></div>
                                <div class="bg-trading-away" style="width: ${100 - game.possession}%"></div>
                            </div>
                        </div>

                        <button onclick="document.getElementById('stats-${game.id}').classList.toggle('hidden')" class="w-full mt-4 py-1.5 bg-trading-dark border border-trading-border rounded text-[9px] font-bold tracking-widest uppercase hover:bg-trading-border transition">
                            <i class="fas fa-expand-alt mr-2 text-trading-highlight"></i> Detalhes da Partida
                        </button>

                        <div id="stats-${game.id}" class="hidden mt-4 pt-4 border-t border-trading-border space-y-3">
                            ${renderStatRow("1.25", "xG", "0.85")}
                            ${renderStatRow("88", "Ataques", "92")}
                            ${renderStatRow(game.shots6m, "Atq. Perigosos (6m)", "0", highP)}
                            ${renderStatRow("4", "Chute no Alvo", "3")}
                            ${renderStatRow("7", "Chute ao lado", "5")}
                        </div>
                    </div>
                `;
            });
        }

        function renderStatRow(homeVal, label, awayVal, highlight = false) {
            const textColor = highlight ? 'text-trading-highlight' : 'text-trading-text';
            return `<div class="grid grid-cols-3 items-center text-[11px] font-mono">
                <span class="text-right text-white font-bold">${homeVal}</span>
                <span class="text-center ${textColor} text-[9px] uppercase font-bold tracking-tighter">${label}</span>
                <span class="text-left text-white font-bold">${awayVal}</span>
            </div>`;
        }

        // --- CÁLCULO DE SENSIBILIDADE CALIBRADO (MOMENTUM) ---
        function generate90Bars(currentMinute) {
            let html = '';
            let intensity = 8; 
            let trend = Math.random() > 0.5 ? 1 : -1;
            let momentumLife = Math.floor(Math.random() * 6) + 5; 

            for(let m = 1; m <= 90; m++) {
                if(m <= currentMinute) {
                    if (m % momentumLife === 0) {
                        if (Math.random() > 0.6) trend *= -1;
                        momentumLife = Math.floor(Math.random() * 10) + 5;
                    }

                    let change = (Math.random() * 6);
                    intensity += (Math.random() > 0.45 ? change : -change);

                    if (intensity > 40) intensity -= (Math.random() * 3);
                    if (intensity > 49) intensity = 48 + Math.random();
                    if (intensity < 2) intensity = 2;

                    const h = (intensity / 50) * 100;
                    const isHome = trend > 0;

                    let mHtml = ''; 
                    const ec = Math.random();
                    if (ec > 0.985) mHtml = `<div class="marker marker-alvo ${isHome ? 'home-marker' : 'away-marker'}"></div>`;
                    else if (ec > 0.94) mHtml = `<div class="marker marker-lado ${isHome ? 'home-marker' : 'away-marker'}"></div>`;
                    
                    html += `<div class="minute-slot">${mHtml}<div class="${isHome ? 'bar-home' : 'bar-away'}" style="height: ${h}%"></div></div>`;
                } else { 
                    html += `<div class="minute-slot"></div>`; 
                }
            }
            return html;
        }

        function nextPage() { currentPage++; renderGrid(); window.scrollTo(0,0); }
        function prevPage() { currentPage--; renderGrid(); window.scrollTo(0,0); }

        renderGrid();
    </script>
</body>
</html>
