    <script>
        tailwind.config = {
            theme: {
                extend: {

                        trading: {

    <style>
        body { background-color: #0B0E14; color: #E2E8F0; font-family: 'Inter', sans-serif; }
        .nav-links { display: flex; gap: 20px; list-style: none; }
        .nav-links a { color: #718096; font-size: 14px; font-weight: 600; text-decoration: none; transition: 0.3s; }

        .tab-btn { color: #718096; font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; transition: 0.2s; position: relative; padding-bottom: 12px; }
        .tab-btn.active { color: #FFB100; }
        .tab-btn.active::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 2px; background: #FFB100; }

<body class="antialiased selection:bg-trading-highlight selection:text-black">

    <nav class="border-b border-trading-border p-4 mb-8 bg-trading-dark sticky top-0 z-50 shadow-md">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="text-xl font-black italic tracking-tighter text-white">FUT <span class="text-trading-highlight">TRADER</span></div>
            <ul class="nav-links">
                <li><a href="inicio.html" class="text-trading-highlight">Início</a></li>
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="aovivo.html">Ao Vivo</a></li>
                <li><a href="index.html" class="text-red-500 hover:text-red-400">Sair</a></li>
            </ul>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-4 min-h-screen">
        <div class="flex flex-col md:flex-row justify-between items-end mb-10 gap-6">
            <div>
                <h1 class="text-4xl font-black text-white tracking-tighter uppercase italic leading-none">QUARTEL <span class="text-trading-highlight">GENERAL</span></h1>
                <p class="text-gray-500 text-xs mt-2 font-medium tracking-wide">Monitorando <span id="game-count" class="text-white font-bold">0</span> eventos em tempo real.</p>
            </div>
            <div class="w-full md:w-auto relative">
                <i class="fas fa-search absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-500"></i>
                <input type="text" id="agendaSearch" oninput="renderAgenda()" placeholder="Filtrar time ou liga..." 
                class="w-full md:w-80 bg-trading-panel border border-trading-border rounded-xl py-3 pl-10 pr-6 text-xs focus:outline-none focus:border-trading-highlight text-white shadow-2xl transition-all placeholder-gray-600">
            </div>
        </div>

        <div id="loading-alert" class="text-center py-24 flex flex-col items-center justify-center animate-in">
            <i id="loading-icon" class="fas fa-circle-notch fa-spin text-trading-highlight text-4xl mb-6"></i>
            <h2 id="loading-title" class="text-white font-black uppercase tracking-widest text-sm mb-2">Sincronizando Dados</h2>
            <p id="loading-text" class="text-gray-500 font-medium text-xs max-w-md">Conectando ao motor Ferrari para extrair a grade global...</p>
            <button id="retry-btn" onclick="retryConnection()" class="hidden mt-6 bg-trading-highlight/10 border border-trading-highlight text-trading-highlight px-6 py-2 rounded-lg text-xs font-bold uppercase tracking-widest hover:bg-trading-highlight hover:text-black transition-all">
                Tentar Novamente
            </button>
        </div>

        <div id="agenda-list" class="space-y-10 pb-20"></div>
    </main>

    <script>
        let gamesData = [];
        let favorites = [];
        let retryCount = 0;
        const MAX_RETRIES = 6; // Tenta por 30 segundos no máximo

        // BLINDAGEM DO LOCAL STORAGE
        try {
            favorites = JSON.parse(localStorage.getItem('futTraderFavs')) || [];
            if (!Array.isArray(favorites)) favorites = [];
        } catch(e) { 
            favorites = []; 
            localStorage.removeItem('futTraderFavs');
        }

        // TRATAMENTO DE STATUS DE JOGO
        function tratarStatus(status) {
            if (!status) return "--:--";
            const s = status.toUpperCase();
            if (s.includes("SCHEDULED")) return "Em Breve";
            if (s.includes("CANCELED") || s.includes("CANCELLED")) return "Cancelado";
            if (s.includes("POSTPONED")) return "Adiado";
            if (s.includes("FT-PENS") || s.includes("PEN")) return "FT-Penal";
            const finalizacoes = ["FT", "FINAL", "ENDED", "FIM", "FULL TIME", "HALF TIME", "HT"];
            if (finalizacoes.some(f => s === f || s.includes(f))) return s.includes("HT") || s.includes("HALF") ? "Intervalo" : "FIM";
            return status.replace(/AM|PM/gi, "").trim();
        }

        // MOTOR DE CONEXÃO SUPREMO
        async function conectarAoMotor() {
            const alertBox = document.getElementById('loading-alert');
            const alertTitle = document.getElementById('loading-title');
            const alertText = document.getElementById('loading-text');
            const alertIcon = document.getElementById('loading-icon');
            const retryBtn = document.getElementById('retry-btn');

            alertBox.classList.remove('hidden');
            retryBtn.classList.add('hidden');
            
            try {
                const response = await fetch('https://motor-ferrari.onrender.com/jogos');
                
                if (!response.ok) throw new Error("Servidor HTTP Indisponível (Erro " + response.status + ")");
                
                const result = await response.json();
                
                if (!result.sucesso) throw new Error("Bloqueio da API: " + result.erro);

                if (result.dados && result.dados.length > 0) {
                    const grouped = result.dados.reduce((acc, game) => {
                        const key = game.league || "Outras Competições";
                        if (!acc[key]) acc[key] = { name: key, games: [] };
                        acc[key].games.push(game);
                        return acc;
                    }, {});

                    gamesData = Object.values(grouped);
                    alertBox.classList.add('hidden');
                    retryCount = 0; // Reset das tentativas
                    renderAgenda();
                } else {
                    alertIcon.className = "fas fa-futbol text-gray-600 text-4xl mb-6";
                    alertTitle.innerText = "Grade Vazia";
                    alertText.innerText = "Nenhum evento detectado para o dia de hoje.";
                }

            } catch (error) {
                console.warn("Tentativa " + (retryCount + 1) + " falhou: ", error.message);
                
                if (retryCount < MAX_RETRIES && !error.message.includes("Bloqueio da API")) {
                    retryCount++;
                    alertIcon.className = "fas fa-power-off text-trading-highlight text-4xl mb-6 animate-pulse";
                    alertTitle.innerText = "Acordando Motor";
                    alertText.innerText = `O servidor Render estava dormindo. Inicializando motores (Tentativa ${retryCount}/${MAX_RETRIES})...`;
                    setTimeout(conectarAoMotor, 5000); 
                } else {
                    // FALHA CRÍTICA - PARA O LOOP E MOSTRA O BOTÃO DE RECARREGAR
                    alertIcon.className = "fas fa-exclamation-triangle text-red-500 text-4xl mb-6";
                    alertTitle.innerText = "Falha de Conexão";
                    alertTitle.classList.replace("text-white", "text-red-500");
                    alertText.innerHTML = `Não foi possível conectar à base de dados.<br><span class="text-[10px] text-gray-600 uppercase tracking-widest mt-2 block">Causa: ${error.message}</span>`;
                    retryBtn.classList.remove('hidden');
                }
            }
        }

        function retryConnection() {
            retryCount = 0;
            document.getElementById('loading-icon').className = "fas fa-circle-notch fa-spin text-trading-highlight text-4xl mb-6";
            document.getElementById('loading-title').innerText = "Sincronizando Dados";
            document.getElementById('loading-title').classList.replace("text-red-500", "text-white");
            document.getElementById('loading-text').innerText = "Reconectando ao motor Ferrari...";
            conectarAoMotor();
        }

        // RENDERIZAÇÃO DA GRADE COM CSS BLINDADO
        function renderAgenda() {
            const list = document.getElementById('agenda-list');
            const search = document.getElementById('agendaSearch').value.toUpperCase();
            let totalCount = 0;
            list.innerHTML = '';

            gamesData.forEach(league => {
                const filteredGames = league.games.filter(g => 
                    (g.home && g.home.toUpperCase().includes(search)) || 
                    (g.away && g.away.toUpperCase().includes(search)) ||
                    (league.name && league.name.toUpperCase().includes(search))
                );

                if (filteredGames.length > 0) {
                    let html = `
                        <div class="league-section animate-in">
                            <div class="flex items-center gap-3 mb-3 px-2">
                                <div class="w-1 h-4 bg-trading-highlight rounded-full"></div>
                                <span class="text-[11px] font-black text-white uppercase tracking-[2px]">${league.name}</span>
                            </div>
                            <div class="bg-trading-panel rounded-xl border border-trading-border overflow-hidden divide-y divide-white/5 shadow-xl">
                    `;

                    filteredGames.forEach(game => {
                        totalCount++;
                        const isFav = favorites.includes(String(game.id));
                        const statusFormatado = tratarStatus(game.time);
                        const statusColor = ['FIM', 'Cancelado', 'Adiado', 'FT-Penal'].includes(statusFormatado) ? 'text-red-500' : 'text-trading-highlight';
                        
                        html += `

                                        <div class="text-center min-w-[50px] md:min-w-[60px]">

                                        </div>
                                        <div class="flex flex-col flex-1">
                                            <div class="flex items-center gap-3 flex-wrap">

                                                <span class="text-sm md:text-base font-black text-white uppercase tracking-tight">${game.away || 'Time Fora'}</span>
                                            </div>
                                            <span class="text-[9px] text-gray-500 uppercase mt-1 tracking-wider truncate max-w-xs"><i class="fas fa-map-marker-alt mr-1 text-gray-600"></i>${game.venue || 'Local não informado'}</span>

                                        <button onclick="event.stopPropagation(); toggleFav('${game.id}')" class="focus:outline-none p-2">

                                        </button>
                                    </div>
                                </div>

                                <div id="details-${game.id}" class="hidden bg-[#0D1117] border-t border-white/5 shadow-inner">
                                    <div class="flex gap-6 md:gap-8 px-6 md:px-8 border-b border-white/5 overflow-x-auto no-scrollbar pt-4">
                                        <button onclick="switchTab('${game.id}', 'resumo')" id="tab-resumo-${game.id}" class="tab-btn active whitespace-nowrap">RESUMO</button>
                                        <button onclick="switchTab('${game.id}', 'class')" id="tab-class-${game.id}" class="tab-btn whitespace-nowrap">CLASSIFICAÇÃO</button>
                                        <button onclick="switchTab('${game.id}', 'h2h')" id="tab-h2h-${game.id}" class="tab-btn whitespace-nowrap">H2H DETALHADO</button>
                                        <button onclick="switchTab('${game.id}', 'top')" id="tab-top-${game.id}" class="tab-btn whitespace-nowrap">DESTAQUES</button>
                                    </div>

                                    <div class="p-6 md:p-8 relative min-h-[150px]">
                                        <div id="loader-detalhe-${game.id}" class="absolute inset-0 bg-[#0D1117]/80 backdrop-blur-sm flex items-center justify-center z-10 hidden rounded-b-xl">
                                            <i class="fas fa-circle-notch fa-spin text-trading-highlight text-2xl drop-shadow-lg"></i>
                                        </div>

                                        <div id="content-resumo-${game.id}" class="tab-content-${game.id} grid grid-cols-1 md:grid-cols-3 gap-6 animate-in">
                                            <div class="space-y-3 bg-white/[0.02] p-4 rounded-xl border border-white/5">
                                                <h4 class="text-[9px] text-gray-500 font-black uppercase tracking-widest">Momento Recente</h4>
                                                <div class="flex items-center gap-4">
                                                    <div class="flex gap-1" id="form-home-${game.id}"><span class="text-[10px] text-gray-600 italic">Buscando...</span></div>
                                                    <div class="w-px h-6 bg-white/10"></div>
                                                    <div class="flex gap-1" id="form-away-${game.id}"><span class="text-[10px] text-gray-600 italic">Buscando...</span></div>
                                                </div>
                                            </div>
                                            <div class="space-y-3 bg-white/[0.02] p-4 rounded-xl border border-white/5">
                                                <h4 class="text-[9px] text-gray-500 font-black uppercase tracking-widest">Status da Partida</h4>
                                                <p class="text-[11px] text-white/70">Situação: <span id="status-${game.id}" class="text-white font-bold ml-1">...</span></p>
                                                <p class="text-[11px] text-white/70 truncate">Local: <span class="text-white font-bold ml-1">${game.venue || 'N/A'}</span></p>
                                            </div>
                                            <div class="bg-trading-highlight/10 p-4 rounded-xl border-l-4 border-trading-highlight flex flex-col justify-center">
                                                <h4 class="text-[9px] text-trading-highlight font-black uppercase mb-1 tracking-widest">Análise ClubElo</h4>
                                                <p class="text-xs text-gray-300" id="tip-${game.id}">Processando motor matemático...</p>
                                            </div>
                                        </div>

                                        <div id="content-class-${game.id}" class="tab-content-${game.id} hidden animate-in">
                                            <div id="tabela-container-${game.id}" class="grid grid-cols-2 gap-4 text-center bg-white/[0.02] rounded-xl p-6 border border-white/5 hidden">
                                                <div class="flex flex-col items-center justify-center space-y-2">
                                                    <p class="text-[10px] text-white uppercase font-black tracking-widest bg-black/40 px-3 py-1 rounded-full truncate max-w-full">${game.home}</p>
                                                    <div class="flex gap-6 mt-2">
                                                        <div>
                                                            <p class="text-[9px] text-gray-500 uppercase font-bold">Posição</p>
                                                            <p id="pos-home-${game.id}" class="font-black text-xl text-trading-highlight mt-1">-</p>
                                                        </div>

                                                            <p class="text-[9px] text-gray-500 uppercase font-bold">Pontos</p>
                                                            <p id="pts-home-${game.id}" class="font-black text-xl text-white mt-1">-</p>
                                                        </div>
                                                    </div>
                                                </div>
                                                <div class="flex flex-col items-center justify-center space-y-2 border-l border-white/10 pl-4">
                                                    <p class="text-[10px] text-white uppercase font-black tracking-widest bg-black/40 px-3 py-1 rounded-full truncate max-w-full">${game.away}</p>
                                                    <div class="flex gap-6 mt-2">
                                                        <div>
                                                            <p class="text-[9px] text-gray-500 uppercase font-bold">Posição</p>
                                                            <p id="pos-away-${game.id}" class="font-black text-xl text-trading-highlight mt-1">-</p>
                                                        </div>
                                                        <div>
                                                            <p class="text-[9px] text-gray-500 uppercase font-bold">Pontos</p>
                                                            <p id="pts-away-${game.id}" class="font-black text-xl text-white mt-1">-</p>
                                                        </div>
                                                    </div>

                                            </div>
                                        </div>

                                        <div id="content-h2h-${game.id}" class="tab-content-${game.id} hidden animate-in">
                                            <div id="h2h-container-${game.id}" class="grid grid-cols-1 lg:grid-cols-2 gap-8 hidden">
                                                <div class="bg-white/[0.02] p-4 rounded-xl border border-white/5">
                                                    <p class="text-[10px] text-trading-highlight uppercase font-black tracking-widest mb-4 border-b border-white/10 pb-2 flex items-center gap-2">
                                                        <i class="fas fa-shield-alt"></i> ${game.home}
                                                    </p>
                                                    <div id="h2h-list-home-${game.id}" class="space-y-2"></div>
                                                </div>
                                                <div class="bg-white/[0.02] p-4 rounded-xl border border-white/5">
                                                    <p class="text-[10px] text-trading-highlight uppercase font-black tracking-widest mb-4 border-b border-white/10 pb-2 flex items-center gap-2">
                                                        <i class="fas fa-shield-alt"></i> ${game.away}
                                                    </p>
                                                    <div id="h2h-list-away-${game.id}" class="space-y-2"></div>
                                                </div>
                                            </div>
                                            <div id="h2h-aviso-${game.id}" class="text-center py-8">
                                                <i class="fas fa-history text-gray-700 text-2xl mb-2"></i>
                                                <p class="text-[10px] text-gray-500 uppercase font-bold tracking-widest">Aguardando histórico de confrontos...</p>
                                            </div>
                                        </div>

                                        <div id="content-top-${game.id}" class="tab-content-${game.id} hidden animate-in">
                                             <div id="stats-container-${game.id}" class="grid grid-cols-3 gap-6 text-center items-center bg-white/[0.02] p-6 rounded-xl border border-white/5 hidden">
                                                <div class="flex flex-col items-center">
                                                    <p class="text-[9px] text-gray-500 uppercase font-bold mb-1 w-full truncate">${game.home}</p>
                                                    <p id="stats-home-pos-${game.id}" class="text-2xl font-black text-white">-</p>
                                                </div>
                                                <div>
                                                    <i class="fas fa-futbol text-trading-highlight text-xl mb-1 opacity-50"></i>
                                                    <p class="text-[10px] text-gray-400 uppercase font-black tracking-widest">Posse de Bola</p>
                                                </div>
                                                <div class="flex flex-col items-center">
                                                    <p class="text-[9px] text-gray-500 uppercase font-bold mb-1 w-full truncate">${game.away}</p>
                                                    <p id="stats-away-pos-${game.id}" class="text-2xl font-black text-white">-</p>
                                                </div>

                                                <div class="pt-4 border-t border-white/5">
                                                    <p id="stats-home-shots-${game.id}" class="text-xl font-bold text-gray-300">-</p>
                                                </div>
                                                <div class="pt-4 border-t border-white/5">
                                                    <p class="text-[10px] text-gray-400 uppercase font-black tracking-widest">Chutes Totais</p>
                                                </div>
                                                <div class="pt-4 border-t border-white/5">
                                                    <p id="stats-away-shots-${game.id}" class="text-xl font-bold text-gray-300">-</p>
                                                </div>
                                            </div>
                                            <div id="stats-aviso-${game.id}" class="text-center py-8">
                                                <i class="fas fa-chart-bar text-gray-700 text-2xl mb-2"></i>
                                                <p class="text-[10px] text-gray-500 uppercase font-bold tracking-widest">Estatísticas ao vivo indisponíveis.</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        `;
                    });
                    html += `</div></div>`;
                    list.innerHTML += html;
                }
            });
            document.getElementById('game-count').innerText = totalCount;
        }

        // SISTEMA DE NAVEGAÇÃO INTERNA (ABAS)
        function switchTab(id, aba) {
            const container = document.getElementById(`details-${id}`);
            if(!container) return; 
            container.querySelectorAll(`.tab-content-${id}`).forEach(c => c.classList.add('hidden'));
            container.querySelectorAll(`.tab-btn`).forEach(b => b.classList.remove('active'));
            document.getElementById(`content-${aba}-${id}`).classList.remove('hidden');
            document.getElementById(`tab-${aba}-${id}`).classList.add('active');
        }

        // ABRIR DETALHES E CHAMAR API
        async function toggleDetails(id) { 
            const el = document.getElementById(`details-${id}`);
            if(!el) return;
            const isOpening = el.classList.contains('hidden');
            el.classList.toggle('hidden');
            
            if (isOpening) {
                switchTab(id, 'resumo');
                if (document.getElementById(`form-home-${id}`).innerHTML.includes('Buscando')) {
                    buscarDetalhesSeguros(id);
                }
            }
        }

        // FAVORITOS
        function toggleFav(id) {
            id = String(id);
            if (favorites.includes(id)) {
                favorites = favorites.filter(f => f !== id);
            } else {
                favorites.push(id);
            }
            localStorage.setItem('futTraderFavs', JSON.stringify(favorites));
            renderAgenda();
        }

        // 🛡️ INJEÇÃO DE DADOS BLINDADA (Com classes TailWind Nativo Imutáveis)
        async function buscarDetalhesSeguros(id) {
            const loader = document.getElementById(`loader-detalhe-${id}`);
            if(loader) loader.classList.remove('hidden');

            try {
                const resp = await fetch(`https://motor-ferrari.onrender.com/detalhes/${id}`);
                const result = await resp.json();

                if (!result.sucesso) throw new Error("API retornou sucesso falso.");

                document.getElementById(`status-${id}`).innerText = tratarStatus(result.status || 'Ao Vivo');

                // UTILIZANDO CORES NATIVAS DO TAILWIND (bg-emerald-500, bg-red-500, bg-gray-500)
                const buildForm = (arr) => {
                    if (!arr || arr.length === 0 || arr[0] === '?') return `<span class="text-[10px] font-bold text-gray-600 bg-black/30 px-2 py-1 rounded">INDISPONÍVEL</span>`;
                    return arr.map(r => {
                        let corClass = 'bg-gray-500'; // Empate ou indefinido
                        if (r === 'V') corClass = 'bg-emerald-500';
                        if (r === 'D') corClass = 'bg-red-500';
                        return `<div class="form-dot ${corClass} shadow-md">${r}</div>`;
                    }).join('');
                };

                document.getElementById(`form-home-${id}`).innerHTML = buildForm(result.forma?.home);
                document.getElementById(`form-away-${id}`).innerHTML = buildForm(result.forma?.away);

                const eloHome = result.soccerdata?.home_elo;
                const eloAway = result.soccerdata?.away_elo;
                if (eloHome && eloHome !== 'N/A' && eloAway !== 'N/A') {
                    document.getElementById(`tip-${id}`).innerHTML = `<span class="text-white font-black text-sm">Casa (${eloHome})</span> <span class="text-gray-500 text-[10px] mx-1">VS</span> <span class="text-white font-black text-sm">Fora (${eloAway})</span>`;
                } else {
                    document.getElementById(`tip-${id}`).innerText = `Sem rating disponível na base do ClubElo.`;
                }

                if (result.tabela && result.tabela.pos_home && result.tabela.pos_home !== "-") {
                    document.getElementById(`pos-home-${id}`).innerText = result.tabela.pos_home + "º";
                    document.getElementById(`pos-away-${id}`).innerText = result.tabela.pos_away + "º";
                    document.getElementById(`pts-home-${id}`).innerText = result.tabela.pts_home;
                    document.getElementById(`pts-away-${id}`).innerText = result.tabela.pts_away;
                    document.getElementById(`tabela-container-${id}`).classList.remove('hidden');
                    document.getElementById(`tabela-aviso-${id}`).classList.add('hidden');
                } else {
                    document.getElementById(`tabela-aviso-${id}`).innerHTML = `<i class="fas fa-info-circle text-gray-700 text-2xl mb-2"></i><p class="text-[10px] text-gray-500 uppercase font-bold tracking-widest">Classificação não aplicável para esta competição.</p>`;
                }

                const buildH2HList = (historico) => {
                    if (!historico || historico.length === 0) return '';
                    return historico.map(h => {
                        let textCor = 'text-gray-400';
                        if (h.resultado === 'V') textCor = 'text-emerald-500';
                        if (h.resultado === 'D') textCor = 'text-red-500';
                        const jogoLimpo = h.jogo.replace(/"/g, '&quot;');
                        
                        return `
                            <div class="flex justify-between items-center bg-black/20 p-3 rounded-lg border border-white/5 text-xs hover:bg-black/40 transition-colors">
                                <span class="text-gray-300 w-[60%] truncate font-medium" title="${jogoLimpo}">${jogoLimpo}</span>
                                <div class="flex items-center gap-4 w-[40%] justify-end">
                                    <span class="font-mono text-white font-black bg-white/5 px-2 py-1 rounded">${h.placar}</span>
                                    <span class="font-black ${textCor} w-4 text-center text-sm drop-shadow-md">${h.resultado}</span>
                                </div>
                            </div>
                        `;
                    }).join('');
                };

                if (result.historico && (result.historico.home.length > 0 || result.historico.away.length > 0)) {
                    document.getElementById(`h2h-list-home-${id}`).innerHTML = buildH2HList(result.historico.home);
                    document.getElementById(`h2h-list-away-${id}`).innerHTML = buildH2HList(result.historico.away);
                    document.getElementById(`h2h-container-${id}`).classList.remove('hidden');
                    document.getElementById(`h2h-aviso-${id}`).classList.add('hidden');
                } else {
                    document.getElementById(`h2h-aviso-${id}`).innerHTML = `<i class="fas fa-history text-gray-700 text-2xl mb-2"></i><p class="text-[10px] text-gray-500 uppercase font-bold tracking-widest">Histórico de confrontos indisponível.</p>`;
                }

                if (result.estatisticas && result.estatisticas.home_possession && result.estatisticas.home_possession !== "-") {
                    document.getElementById(`stats-home-pos-${id}`).innerText = result.estatisticas.home_possession + "%";
                    document.getElementById(`stats-away-pos-${id}`).innerText = result.estatisticas.away_possession + "%";
                    document.getElementById(`stats-home-shots-${id}`).innerText = result.estatisticas.home_shots;
                    document.getElementById(`stats-away-shots-${id}`).innerText = result.estatisticas.away_shots;
                    document.getElementById(`stats-container-${id}`).classList.remove('hidden');
                    document.getElementById(`stats-aviso-${id}`).classList.add('hidden');
                } else {
                    document.getElementById(`stats-aviso-${id}`).innerHTML = `<i class="fas fa-clock text-gray-700 text-2xl mb-2"></i><p class="text-[10px] text-gray-500 uppercase font-bold tracking-widest">Aguardando bola rolar para gerar estatísticas.</p>`;
                }

            } catch (e) {
                // TRATAMENTO DE ERRO DE EXTRAÇÃO
                document.getElementById(`status-${id}`).innerText = 'Info Limitada';
                document.getElementById(`form-home-${id}`).innerHTML = `<span class="text-[10px] text-gray-600 bg-black/30 px-2 py-1 rounded">FALHA</span>`;
                document.getElementById(`form-away-${id}`).innerHTML = `<span class="text-[10px] text-gray-600 bg-black/30 px-2 py-1 rounded">FALHA</span>`;
                document.getElementById(`tip-${id}`).innerText = `Base de dados inacessível para este jogo.`;
                document.getElementById(`tabela-aviso-${id}`).innerHTML = `<p class="text-[10px] text-red-500 uppercase font-bold tracking-widest">Erro na comunicação de dados.</p>`;
                document.getElementById(`h2h-aviso-${id}`).innerHTML = `<p class="text-[10px] text-red-500 uppercase font-bold tracking-widest">Erro na comunicação de dados.</p>`;
                document.getElementById(`stats-aviso-${id}`).innerHTML = `<p class="text-[10px] text-red-500 uppercase font-bold tracking-widest">Erro na comunicação de dados.</p>`;
            } finally {
                if(loader) loader.classList.add('hidden');
            }
        }

        // INIT
        conectarAoMotor();
    </script>
</body>
</html>
