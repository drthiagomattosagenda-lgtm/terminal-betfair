<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QG Fut Trader - Central de Inteligência</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        trading: {
                            dark: '#0B0E14',
                            panel: '#151A22',
                            border: '#2A3241',
                            highlight: '#FFB100',
                            win: '#10B981',
                            loss: '#EF4444',
                            draw: '#718096'
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body { background-color: #0B0E14; color: #E2E8F0; font-family: 'Inter', sans-serif; }
        .nav-links { display: flex; gap: 20px; list-style: none; }
        .nav-links a { color: #718096; font-size: 14px; font-weight: 600; text-decoration: none; transition: 0.3s; }
        .nav-links a:hover { color: #FFB100; }
        
        /* Estilo SofaScore Abas */
        .tab-btn { color: #718096; font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; transition: 0.2s; position: relative; padding-bottom: 12px; }
        .tab-btn.active { color: #FFB100; }
        .tab-btn.active::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 2px; background: #FFB100; }
        
        .form-dot { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; color: white; }
        .animate-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="antialiased">

    <nav class="border-b border-trading-border p-4 mb-8">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="text-xl font-black italic tracking-tighter text-white">FUT <span class="text-trading-highlight">TRADER</span></div>
            <ul class="nav-links">
                <li><a href="inicio.html" class="text-trading-highlight">Início</a></li>
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="aovivo.html">Ao Vivo</a></li>
                <li><a href="index.html" class="text-red-500">Sair</a></li>
            </ul>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-4">
        <div class="flex flex-col md:flex-row justify-between items-end mb-10 gap-6">
            <div>
                <h1 class="text-4xl font-black text-white tracking-tighter uppercase italic leading-none">QUARTEL <span class="text-trading-highlight">GENERAL</span></h1>
                <p class="text-gray-500 text-xs mt-2 font-medium tracking-wide">Analizando <span id="game-count" class="text-white">0</span> eventos em tempo real.</p>
            </div>
            <div class="w-full md:w-auto">
                <input type="text" id="agendaSearch" oninput="renderAgenda()" placeholder="🔎 Filtrar por Time ou Liga..." 
                class="w-full md:w-80 bg-trading-panel border border-trading-border rounded-xl py-3 px-6 text-xs focus:outline-none focus:border-trading-highlight text-white shadow-2xl transition-all">
            </div>
        </div>

        <div id="loading-alert" class="text-center py-20">
            <i class="fas fa-circle-notch fa-spin text-trading-highlight text-3xl"></i>
            <p class="text-gray-500 mt-4 font-bold uppercase text-[10px] tracking-[3px]">Sincronizando Inteligência...</p>
        </div>

        <div id="agenda-list" class="space-y-12"></div>
    </main>

    <script>
        let gamesData = [];
        let favorites = JSON.parse(localStorage.getItem('futTraderFavs')) || [];

        async function conectarAoMotor() {
            try {
                const response = await fetch('https://motor-ferrari.onrender.com/jogos');
                const result = await response.json();

                if (result.sucesso && result.dados.length > 0) {
                    const grouped = result.dados.reduce((acc, game) => {
                        const key = game.league;
                        if (!acc[key]) acc[key] = { name: key, country: game.country, games: [] };
                        acc[key].games.push(game);
                        return acc;
                    }, {});

                    gamesData = Object.values(grouped);
                    document.getElementById('loading-alert').classList.add('hidden');
                    renderAgenda();
                }
            } catch (error) {
                console.error("Erro de conexão:", error);
                setTimeout(conectarAoMotor, 5000);
            }
        }

        function renderAgenda() {
            const list = document.getElementById('agenda-list');
            const search = document.getElementById('agendaSearch').value.toUpperCase();
            let totalCount = 0;
            list.innerHTML = '';

            gamesData.forEach(league => {
                const filteredGames = league.games.filter(g => 
                    g.home.toUpperCase().includes(search) || g.away.toUpperCase().includes(search)
                );

                if (filteredGames.length > 0) {
                    let html = `
                        <div class="league-section animate-in">
                            <div class="flex items-center gap-3 mb-4 px-2">
                                <div class="w-1 h-4 bg-trading-highlight rounded-full"></div>
                                <span class="text-[11px] font-black text-white uppercase tracking-[2px]">${league.country}: ${league.name}</span>
                            </div>
                            <div class="bg-trading-panel rounded-2xl border border-trading-border overflow-hidden divide-y divide-white/5 shadow-2xl">
                    `;

                    filteredGames.forEach(game => {
                        totalCount++;
                        const isFav = favorites.includes(game.id);
                        html += `
                            <div class="game-item">
                                <div class="p-5 flex items-center justify-between cursor-pointer hover:bg-white/[0.02] transition" onclick="toggleDetails('${game.id}')">
                                    <div class="flex items-center gap-8">
                                        <div class="text-center min-w-[50px]">
                                            <p class="text-[10px] text-gray-600 font-bold uppercase mb-1">Status</p>
                                            <p class="text-trading-highlight font-mono font-black text-sm">${game.time}</p>
                                        </div>
                                        <div class="flex flex-col">
                                            <div class="flex items-center gap-4">
                                                <span class="text-base font-black text-white uppercase tracking-tight">${game.home}</span>
                                                <span class="text-[10px] text-gray-700 font-black italic">VS</span>
                                                <span class="text-base font-black text-white uppercase tracking-tight">${game.away}</span>
                                            </div>
                                            <span class="text-[9px] text-gray-500 uppercase mt-1 tracking-wider"><i class="fas fa-map-marker-alt mr-1 text-trading-highlight/50"></i>${game.venue}</span>
                                        </div>
                                    </div>
                                    <div class="flex items-center gap-6">
                                        <div class="bg-black/40 px-4 py-2 rounded-xl border border-white/5 text-sm font-mono font-black text-white shadow-inner">${game.score}</div>
                                        <i onclick="event.stopPropagation(); toggleFav('${game.id}')" class="fa-star ${isFav ? 'fas text-trading-highlight' : 'far text-gray-700'} text-xl transition active:scale-150"></i>
                                    </div>
                                </div>

                                <div id="details-${game.id}" class="hidden bg-[#0D1117] border-t border-white/5 animate-in">
                                    <div class="flex gap-8 px-8 border-b border-white/5 overflow-x-auto no-scrollbar">
                                        <button onclick="switchTab('${game.id}', 'resumo')" id="tab-resumo-${game.id}" class="tab-btn active">Resumo</button>
                                        <button onclick="switchTab('${game.id}', 'class')" id="tab-class-${game.id}" class="tab-btn">Classificação</button>
                                        <button onclick="switchTab('${game.id}', 'h2h')" id="tab-h2h-${game.id}" class="tab-btn">H2H / Sequências</button>
                                        <button onclick="switchTab('${game.id}', 'top')" id="tab-top-${game.id}" class="tab-btn">Destaques</button>
                                    </div>

                                    <div class="p-8">
                                        <div id="content-resumo-${game.id}" class="tab-content-${game.id} grid grid-cols-1 md:grid-cols-3 gap-8">
                                            <div class="space-y-4">
                                                <h4 class="text-[10px] text-gray-500 font-black uppercase">Momento das Equipes</h4>
                                                <div class="flex items-center gap-8">
                                                    <div class="flex gap-1">${['V','V','E','V','D'].map(r => `<div class="form-dot bg-trading-${r=='V'?'win':r=='D'?'loss':'draw'}">${r}</div>`).join('')}</div>
                                                    <div class="w-px h-6 bg-white/10"></div>
                                                    <div class="flex gap-1">${['D','E','V','E','E'].map(r => `<div class="form-dot bg-trading-${r=='V'?'win':r=='D'?'loss':'draw'}">${r}</div>`).join('')}</div>
                                                </div>
                                            </div>
                                            <div class="space-y-4">
                                                <h4 class="text-[10px] text-gray-500 font-black uppercase">Informações do Match</h4>
                                                <p class="text-xs text-white/70">Árbitro: <span class="text-white font-bold">FIFA Pro</span></p>
                                                <p class="text-xs text-white/70">Estádio: <span class="text-white font-bold">${game.venue}</span></p>
                                            </div>
                                            <div class="bg-trading-highlight/5 p-4 rounded-2xl border-l-4 border-trading-highlight">
                                                <h4 class="text-[10px] text-trading-highlight font-black uppercase mb-2">Dica do Mestre</h4>
                                                <p class="text-xs text-gray-400 italic">"Mercado de Gols favorável. O motor detectou volume ofensivo acima da média para ${game.home}."</p>
                                            </div>
                                        </div>

                                        <div id="content-class-${game.id}" class="tab-content-${game.id} hidden">
                                            <div class="bg-white/5 rounded-xl p-6 text-center">
                                                <i class="fas fa-table text-gray-700 text-2xl mb-3"></i>
                                                <p class="text-xs text-gray-500 uppercase font-bold tracking-widest">Sincronizando Tabela da ${game.league}...</p>
                                            </div>
                                        </div>

                                        <div id="content-h2h-${game.id}" class="tab-content-${game.id} hidden space-y-6">
                                            <div class="grid grid-cols-3 gap-4 text-center">
                                                <div class="bg-white/5 p-4 rounded-xl"><p class="text-[10px] text-gray-500 uppercase">Vitórias ${game.home}</p><p class="text-xl font-black text-white">5</p></div>
                                                <div class="bg-white/5 p-4 rounded-xl"><p class="text-[10px] text-gray-500 uppercase">Empates</p><p class="text-xl font-black text-white">2</p></div>
                                                <div class="bg-white/5 p-4 rounded-xl"><p class="text-[10px] text-gray-500 uppercase">Vitórias ${game.away}</p><p class="text-xl font-black text-white">3</p></div>
                                            </div>
                                            <div class="bg-trading-loss/10 p-3 rounded-lg border-l-2 border-trading-loss text-[10px] text-gray-400">
                                                <b class="text-white uppercase mr-2">Sequência Ativa:</b> ${game.away} não vence há 4 partidas fora de casa.
                                            </div>
                                        </div>

                                        <div id="content-top-${game.id}" class="tab-content-${game.id} hidden">
                                            <div class="grid grid-cols-2 gap-8">
                                                <div class="space-y-3">
                                                    <p class="text-[9px] text-gray-500 font-black uppercase tracking-tighter">Principais Armas: ${game.home}</p>
                                                    <div class="flex items-center gap-2 text-xs font-bold"><i class="fas fa-star text-trading-highlight"></i> Goleador do Time (12 Gols)</div>
                                                </div>
                                                <div class="space-y-3 text-right">
                                                    <p class="text-[9px] text-gray-500 font-black uppercase tracking-tighter">Principais Armas: ${game.away}</p>
                                                    <div class="flex items-center justify-end gap-2 text-xs font-bold">Maestro do Meio-campo (8 Assis.) <i class="fas fa-star text-trading-highlight"></i></div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        `;
                    });
                    html += `</div></div>`;
                    list.innerHTML += html;
                }
            });
            document.getElementById('game-count').innerText = totalCount;
        }

        function toggleDetails(id) { 
            const el = document.getElementById(`details-${id}`);
            el.classList.toggle('hidden');
        }

        function switchTab(id, tab) {
            const container = document.getElementById(`details-${id}`);
            container.querySelectorAll(`.tab-content-${id}`).forEach(c => c.classList.add('hidden'));
            container.querySelectorAll(`.tab-btn`).forEach(b => b.classList.remove('active'));
            document.getElementById(`content-${tab}-${id}`).classList.remove('hidden');
            document.getElementById(`tab-${tab}-${id}`).classList.add('active');
            event.stopPropagation();
        }

        function toggleFav(id) {
            favorites.includes(id) ? favorites = favorites.filter(f => f !== id) : favorites.push(id);
            localStorage.setItem('futTraderFavs', JSON.stringify(favorites));
            renderAgenda();
        }

        conectarAoMotor();
    </script>
</body>
</html>
