    <script>
        // ======= O MOTOR V8 DE DADOS ======= //
        let liveGamesData = []; // Onde o combustível real vai ficar armazenado
        let favorites = [];
        
        try { favorites = JSON.parse(localStorage.getItem('futTraderFavs')) || []; } catch(e) { favorites = []; }

        // Nova Injeção: Busca os dados reais na API assim que a página abre
        async function carregarCombustivel() {
            const token = "f0772d6c4ebf4102b615b3466f97fd4b"; // Sua chave exclusiva
            const url = "https://api.football-data.org/v4/matches"; // Voltamos para injeção direta sem proxy
            
            try {
                const resposta = await fetch(url, { headers: { 'X-Auth-Token': token } });
                
                // Se o servidor reclamar, vamos capturar o código exato do erro
                if (!resposta.ok) {
                    throw new Error(`Código do Erro: ${resposta.status}`);
                }
                
                const dados = await resposta.json();
                const ligasAgrupadas = {};

                // Processa cada partida e transforma no formato que sua lataria já entende
                dados.matches.forEach(match => {
                    const nomeLiga = match.competition.name.toUpperCase();
                    
                    if (!ligasAgrupadas[nomeLiga]) {
                        ligasAgrupadas[nomeLiga] = { name: nomeLiga, games: [] };
                    }

                    // Identificando o Status do Jogo
                    let horarioStr = new Date(match.utcDate).toLocaleTimeString("pt-BR", { hour: "2-digit", minute: "2-digit" });
                    let statusClass = "text-gray-400";
                    let alerta = "";
                    
                    if (match.status === "IN_PLAY" || match.status === "PAUSED") {
                        horarioStr = match.minute ? `${match.minute}'` : "AO VIVO";
                        statusClass = "text-trading-highlight animate-pulse";
                        alerta = match.status === "PAUSED" ? "INTERVALO" : "AO VIVO";
                    } else if (match.status === "FINISHED") {
                        horarioStr = "ENCERRADO";
                        statusClass = "text-gray-500";
                    } else if (match.status === "POSTPONED" || match.status === "CANCELLED") {
                        horarioStr = match.status === "POSTPONED" ? "ADIADO" : "CANCELADO";
                        statusClass = "text-red-500";
                    }

                    // Puxando Gols
                    const golsCasa = match.score.fullTime.home !== null ? match.score.fullTime.home.toString() : "";
                    const golsFora = match.score.fullTime.away !== null ? match.score.fullTime.away.toString() : "";

                    ligasAgrupadas[nomeLiga].games.push({
                        id: match.id.toString(), // ID real da partida para seu sistema de favoritos/abas funcionar
                        type: "pontos_corridos", 
                        time: horarioStr,
                        statusClass: statusClass,
                        home: match.homeTeam.shortName || match.homeTeam.name,
                        away: match.awayTeam.shortName || match.awayTeam.name,
                        scoreHome: golsCasa,
                        scoreAway: golsFora,
                        venue: "ESTÁDIO", // A API free nem sempre manda o estádio
                        alert: alerta
                    });
                });

                // Transforma o objeto em um Array
                liveGamesData = Object.values(ligasAgrupadas);
                
                // Atualiza o painel "Monitorando X eventos"
                const totalJogos = liveGamesData.reduce((acc, liga) => acc + liga.games.length, 0);
                document.getElementById('game-count').innerText = totalJogos;

                // Remove o loading
                const loadingInfo = document.getElementById('loading-ferrari');
                if (loadingInfo) loadingInfo.remove();

                // Dá a partida e renderiza a tela
                renderAgenda();

            } catch (erro) {
                console.error("Falha no motor V8:", erro);
                document.getElementById('agenda-list').innerHTML = `
                    <div class="text-center py-10 bg-red-900/20 border border-red-500/30 rounded-xl">
                        <p class="text-red-500 text-xs font-black uppercase">Falha na Injeção: ${erro.message}</p>
                        <p class="text-gray-400 text-[10px] mt-4 font-mono">Dicas do Mecânico:</p>
                        <p class="text-gray-500 text-[10px] mt-1">1. Erro 400 ou 403? Você esqueceu de clicar no link de confirmação no seu e-mail.</p>
                        <p class="text-gray-500 text-[10px]">2. Erro 429? Limite de velocidade! (Max 10 atualizações por minuto).</p>
                    </div>
                `;
            }
        }

        // ======= FUNÇÕES DA LATARIA (INTACTAS) ======= //
        function toggleFav(id) {
            id = String(id);
            if (favorites.includes(id)) { favorites = favorites.filter(f => f !== id); } 
            else { favorites.push(id); }
            localStorage.setItem('futTraderFavs', JSON.stringify(favorites));
            renderAgenda(); 
        }

        function switchTab(id, aba) {
            const container = document.getElementById(`details-${id}`);
            if(!container) return; 
            container.querySelectorAll(`.tab-content-${id}`).forEach(c => c.classList.add('hidden'));
            container.querySelectorAll(`.tab-btn-${id}`).forEach(b => b.classList.remove('active'));
            const content = document.getElementById(`content-${aba}-${id}`);
            const tab = document.getElementById(`tab-${aba}-${id}`);
            if (content) content.classList.remove('hidden');
            if (tab) tab.classList.add('active');
        }

        function toggleDetails(id) { 
            const el = document.getElementById(`details-${id}`);
            if(el) {
                const isOpening = el.classList.contains('hidden');
                el.classList.toggle('hidden');
                if (isOpening) switchTab(id, 'resumo');
            }
        }

                                            <p class="text-[11px] text-white/70">Situação: <span class="text-white font-bold ml-1">${game.time}</span></p>
                                            <p class="text-[11px] text-white/70 truncate">Local: <span class="text-white font-bold ml-1">${game.venue}</span></p>
                                        </div>
                                        <div class="bg-trading-highlight/10 p-4 rounded-xl border-l-4 border-trading-highlight flex flex-col justify-center">

                                            <p class="text-xs text-gray-300"><span class="text-white font-black text-sm">${game.home}</span> <span class="text-gray-500 text-[10px] mx-1">VS</span> <span class="text-white font-black text-sm">${game.away}</span></p>
                                        </div>
                                    </div>
                                    <div id="content-class-${game.id}" class="tab-content-${game.id} hidden animate-in">${classHtml}</div>
                                    <div id="content-h2h-${game.id}" class="tab-content-${game.id} hidden animate-in">${h2hHtml}</div>
                                    <div id="content-top-${game.id}" class="tab-content-${game.id} hidden animate-in">${statsHtml}</div>
                                </div>
                            </div>
                        </div>
                    `;
                });
                html += `</div></div>`;
                list.innerHTML += html;
            });

        window.onload = () => { carregarCombustivel(); };
